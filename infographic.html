<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Data Stories</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --bull: #22c55e;
            --bear: #ef4444;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 1rem; border: 1px solid #334155; }
        h2 { color: var(--accent); margin-top: 0; }
        .stat-bar { background: #334155; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .stat-fill { background: var(--accent); height: 100%; }
        .earnings-list { font-size: 0.9rem; list-style: none; padding: 0; }
        .earnings-list li { margin-bottom: 0.5rem; border-left: 2px solid var(--accent); padding-left: 0.5rem; }
    </style>
</head>
<body>
    <h1>Visual Data Stories</h1>
    <div id="stock-container" class="grid"></div>

    <script>
        fetch('data/stocks.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('stock-container');
                data.forEach(stock => {
                    if (!stock.snapshot) return;
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h2>${stock.ticker}</h2>
                        <p>${stock.snapshot.substring(0, 150)}...</p>
                        
                        <label style="font-size: 0.8rem">Revenue Trend Sentiment</label>
                        <div class="stat-bar"><div class="stat-fill" style="width: 70%"></div></div>
                        
                        <h3>Latest Earnings</h3>
                        <ul class="earnings-list">
                            ${stock.latest_earnings.slice(0, 3).map(e => `<li>${e.split('(source')[0]}</li>`).join('')}
                        </ul>
                    `;
                    container.appendChild(card);
                });
            });
    </script>
</body>
</html>
