  "sources/PLTR/financials.md": "---\ncompany: Palantir Technologies (PLTR)\ndocument_type: financial_summary\nlast_updated: 2026-06-17\n---\n\n# Palantir (PLTR) Financial Summary (Q1 2026)\n\n## 1. Key Income Statement Figures (Q1 2026)\n- **Revenue:** $1.633 Billion (up 85% YoY).\n- **GAAP Net Income:** $871 Million (53% Net Margin).\n- **Adjusted EPS:** $0.33 (beating estimates).\n- **Rule of 40 Score:** 145% (85% revenue growth + 60% adjusted operating margin).\n\n## 2. Key Balance Sheet & Cash Flow\n- **Cash, Equivalents & US Treasuries:** $8.0 Billion.\n- **Total Debt:** $0 (Zero Debt).\n- **Cash from Operations:** $899 Million (55% margin).\n- **Adjusted Free Cash Flow:** $925 Million (57% margin).\n\n## 3. Segment Growth (US Market Dominance)\n- **Total US Revenue:** $1.282 Billion (up 104% YoY), accounting for 79% of total revenue.\n- **US Commercial Revenue:** $595 Million (up 133% YoY).\n- **US Government Revenue:** $687 Million (up 84% YoY).\n\n## 4. Full Year 2026 Guidance (Updated)\n- **Revenue Target:** $7.650B - $7.662B (~71% YoY growth).\n- **US Commercial Revenue Target:** >$3.224B (>120% growth).\n- **Adjusted Free Cash Flow Target:** $4.2B - $4.4B.\n\n*Source: Compiled from Q1 2026 Earnings Release and public financial filings (May 2026).*\n",
  "sources/PLTR/market_info.md": "# Market Intelligence Report: Palantir (PLTR)\n**Report Date:** June 17, 2026\n\n## 1. Product & Strategy Momentum\n- **Artificial Intelligence Platform (AIP):** Remains the core growth driver. Success is attributed to \"boot camps\" that rapidly convert prospects into high-value contracts.\n- **Customer Base:** Total customer count reached 1,007 (up 31% YoY). Closed 206 deals of $1M+ in Q1 2026 alone.\n- **Market Positioning:** Transitioning from a niche government contractor to a dominant commercial AI infrastructure provider in the US.\n\n## 2. Key Contracts & Partnerships\n- **USDA Contract:** Up to $300 Million ceiling for farmland security and supply chain resilience.\n- **US Government Expansion:** Continued strength in defense and intelligence, with 84% YoY growth in the US government segment.\n\n## 3. Market Sentiment\n- **Analyst Outlook:** Extremely Bullish following the \"shattering\" of the Rule of 40 metric (145%).\n- **Key Risks:** High concentration in the US market (79% of revenue); potential for volatility in government contract timing; execution risk in maintaining triple-digit commercial growth rates.\n\n*Source: Market intelligence gathering and Q1 2026 performance analysis.*\n",
  "sources/ONDS/earnings-summary-q1-2026.md": "# Ondas Q1 2026 Earnings and Guidance Summary\n\n- Ticker: ONDS\n- Source type: secondary; earnings/news summary\n- Original source: Barron's, \"Palantir-Backed Ondas Stock Soars. Autonomous Drone Company Sees Revenue Grow 1,065%.\"\n- Retrieved: 2026-06-21\n- Coverage period: Q1 2026\n- Reliability: reputable secondary; needs verification against company earnings release / 10-Q\n\n## Key facts\n\n- Barron's reported Q1 2026 revenue of $50.1 million, up 1,065% year over year.\n- Reported revenue beat analyst expectations of about $39.4 million.\n- Barron's said revenue growth was driven by strong performance across Ondas' portfolio, especially counter-unmanned aircraft systems.\n- Ondas reported adjusted EBITDA loss of $10.9 million, narrower than analyst expectations for a $19.6 million loss.\n- Operating expenses reportedly rose 470% to $67.3 million, partly due to acquisitions.\n- Backlog reportedly grew 569% from the end of 2025 to $457 million.\n- Ondas raised full-year 2026 revenue guidance to $390 million from a previous $375 million target.\n- Barron's reported that Ondas expects adjusted EBITDA losses to remain elevated in Q2 2026, but Q2 is expected to be the likely peak before improvement later in the year.\n- Barron's said the company attributes growth to acquisitions, autonomous systems demand, and its strategic partnership with Palantir.\n- Ondas shares rose 27% after the Q1 2026 results, highlighting strong investor reaction but also high volatility.\n\n## Useful for future briefs\n\n- Use this file for latest earnings, revenue guidance, backlog, market reaction, and profitability risk.\n- The central positive signal is rapid growth in autonomous systems and counter-UAS demand.\n- The central risk is that the business is still loss-making and expense growth/acquisitions could obscure organic profitability.\n\n## Caveats\n\n- This is not the official company 10-Q or earnings transcript.\n- Add the company Q1 2026 press release, 10-Q, and call transcript when available.\n- Barron's may be paywalled; use the summarized facts cautiously and verify against primary filings before making high-conviction decisions.\n\n",
  "sources/ONDS/financials.md": "---\ncompany: Ondas Holdings Inc. (ONDS)\ndocument_type: financial_summary\nlast_updated: 2026-06-17\n---\n\n# ONDS Financial Summary (Historical & Current Context)\n\n## 1. Q3 2024 Financial Results (Audit Baseline)\n- **Revenue:** $1.5 Million (down from $2.7M in Q3 2023)\n- **Net Loss:** $9.5 Million\n- **Cash Position:** $2.9 Million (as of Sept 30, 2024)\n- **Monthly Burn Rate (Est):** ~$2.3 Million ($7.1M operating expenses per quarter)\n- **Cash Runway (Late 2024):** Critical (< 2 months without financing)\n\n## 2. Fiscal Year 2025 Performance\n- **Annual Revenue:** Significant growth reaching ~$36 Million+ driven by OAS drone systems and rail network upgrades.\n- **Q3 2025 Revenue:** $10.1 Million (582% YoY increase).\n- **Liquidity Event:** Massive public offering and capital raises resulted in a cash position of $432.8 Million by Sept 30, 2025.\n\n## 3. 2026 Projections & Current Status\n- **Target Revenue 2026:** Updated external reporting now points to management raising full-year 2026 revenue guidance to approximately $390 Million after Q1 2026 results. See `sources/ONDS/earnings-summary-q1-2026.md`.\n- **Solvency:** Highly improved liquidity following 2025 capital raises.\n- **Backlog:** Strong bookings of $14.4M reported in late 2024 have converted into a steady revenue stream.\n\n## 4. Q1 2026 Update\n- **Q1 2026 Revenue:** Barron's reported $50.1 Million, up 1,065% YoY.\n- **Backlog:** Barron's reported backlog of $457 Million, up 569% from the end of 2025.\n- **Profitability:** Adjusted EBITDA loss remained negative at $10.9 Million, but narrower than analyst expectations.\n- **Operating Expense Risk:** Operating expenses reportedly rose sharply due in part to acquisitions.\n\n*Update source: `sources/ONDS/earnings-summary-q1-2026.md` (added Jun 2026).*\n\n*Source: Compiled from public 8-K filings and investor relations reports (Jun 2026).*\n",
  "sources/ONDS/market_info.md": "# Market Intelligence Report: ONDS (Ondas Holdings Inc.)\n**Report Date:** June 17, 2026\n\n## 1. Recent Contracts & Partnerships\n- **Defense Sector:** Airobotics (subsidiary) continues to secure major orders for the Iron Drone Raider, including a multi-layered security integration for an Israeli defense firm.\n- **Infrastructure:** Siemens partnership for 900 MHz rail upgrades (Metra Chicago) is fully operational.\n- **Civilian Security:** €8.2 Million contract for Counter-UAS systems at a major European airport.\n\n## 2. Regulatory & Listing Status\n- **Nasdaq Compliance:** Successfully maintained listing status; share price recovered above $1.00 following 2025 growth.\n- **IP & Standards:** Leading the IEEE 802.16t standard for industrial wireless systems.\n\n## 3. Market Sentiment\n- **Analyst Rating:** Strong Buy (H.C. Wainwright, Northland Capital).\n- **Price Targets:** Average ~$18-20 range.\n- **Key Risks:** Share dilution remains a concern for legacy investors due to 2025 capital raises; execution speed in defense contracts.\n\n## 4. 2026 Autonomous Systems Momentum\n- **Palantir partnership:** Barron's reported that Ondas and Palantir announced a strategic partnership in March 2026 to integrate Palantir Foundry into Ondas autonomous drone platforms.\n- **Q1 2026 reaction:** Barron's reported shares rose 27% after Q1 2026 results, driven by revenue growth, backlog expansion, and raised guidance.\n- **Backlog:** Barron's reported backlog of $457M after Q1 2026, up 569% from the end of 2025.\n- **Guidance:** Barron's reported Ondas raised 2026 revenue guidance to $390M.\n\n*Source: Market intelligence gathering (Jun 2026).*\n",
  "sources/ASTS/market-info.md": "# AST SpaceMobile Market Info\n\n- Ticker: ASTS\n- Source type: mixed secondary; market-info\n- Original source: Space.com, Houston Chronicle, Midland Reporter-Telegram, Investor's Business Daily, MarketWatch, Barron's, public company/news summaries\n- Retrieved: 2026-06-20\n- Coverage period: 2024-2026 public context\n- Reliability: reputable secondary; needs verification against official filings and investor presentations\n\n## Key facts\n\n- AST SpaceMobile is building a low Earth orbit direct-to-device cellular broadband network designed to connect standard, unmodified smartphones.\n- The business thesis depends on deploying enough BlueBird satellites to provide useful coverage, then monetizing through mobile network operator partnerships and related commercial/government opportunities.\n- News reports cite major relationships or partnerships involving AT&T, Verizon, Vodafone, Google, Rakuten, and other mobile network operators.\n- Midland Reporter-Telegram reported AST has agreements with nearly 60 mobile network operators covering more than 3 billion users globally.\n- Houston Chronicle reported that AST aims to provide direct 4G and 5G service to phones without additional hardware, especially in remote areas outside terrestrial tower coverage.\n- Houston Chronicle reported that AST's broader deployment targets include about 45 satellites for selected commercial coverage and about 90 satellites for continuous global coverage.\n- MarketWatch reported that BlueBird 7, launched on Blue Origin's New Glenn in April 2026, failed to reach the intended orbit and was expected to de-orbit, creating a schedule setback even if insurance covers asset cost.\n- Investor's Business Daily and MarketWatch framed AST as high-potential but execution-heavy, with revenue still small relative to investor expectations and losses still large.\n- Barron's highlighted SpaceX/Starlink Mobile as a competitive reference point for satellite-to-cell service.\n\n## Useful for future briefs\n\n- Use this file for company snapshot, business model, partner context, and structural risk framing.\n- This is a story-to-execution transition stock: the central question is whether the company can move from technical milestones and partnerships into scaled commercial revenue.\n- The most important operating metrics to track are operational satellites, launch cadence, commercial launch dates by geography, partner activation, revenue mix, cash burn, and dilution.\n\n## Caveats\n\n- This is a curated market summary, not a primary company source.\n- Add AST's latest 10-K, 10-Q, investor presentation, and earnings transcript for any detailed financial work.\n- Some partnership terms may be non-binding, conditional, prepaid, usage-based, or region-specific; do not assume all partnerships create immediate recurring revenue.\n\n",
  "sources/ASTS/earnings-summary-q1-2026.md": "# AST SpaceMobile Q1 2026 Earnings Summary\n\n- Ticker: ASTS\n- Source type: secondary; earnings/news summary\n- Original source: Investor's Business Daily, \"AST SpaceMobile Earnings, Revenue Miss Amid Satellite Launch Delays\"; MarketWatch, \"AST SpaceMobile's stock drops as earnings come with a big disappointment\"\n- Retrieved: 2026-06-20\n- Coverage period: Q1 2026\n- Reliability: reputable secondary; needs verification against company 10-Q / earnings release\n\n## Key facts\n\n- Investor's Business Daily reported that AST SpaceMobile generated Q1 2026 revenue of about $14.7 million, up from about $718,000 in the prior-year quarter, but below analyst estimates near $39 million.\n- Investor's Business Daily reported Q1 2026 loss per share of about $0.66, wider than the prior-year loss of about $0.20 and worse than analyst expectations near $0.24.\n- MarketWatch reported a Q1 2026 net loss of about $191 million, much wider than about $45.7 million in the prior-year period and worse than analyst expectations near $86.8 million.\n- MarketWatch reported that the shares fell after hours following the Q1 2026 results, reflecting disappointment around the revenue miss and deeper loss.\n- Both reports said management maintained full-year 2026 revenue guidance of about $150 million to $200 million.\n- Investor's Business Daily reported management's longer-term ambition for revenue to approach about $1 billion in 2027 after commercial service activation.\n- The reports connect the earnings debate to satellite deployment timing, especially whether AST can reach enough deployed satellites for commercial service in targeted markets.\n\n## Useful for future briefs\n\n- Use this source for the `Latest earnings` section until a primary company earnings release, 10-Q, or transcript is added.\n- Treat Q1 2026 as an execution-and-guidance quarter rather than proof of mature profitability.\n- The key investor question is not just revenue growth, but whether AST can convert guidance into actual commercial service revenue without repeated delays or heavy dilution.\n\n## Caveats\n\n- This is not a primary filing or official company transcript.\n- Add the official AST SpaceMobile Q1 2026 earnings release, 10-Q, and transcript if available before making a high-conviction financial model.\n- Analyst estimates and market reaction can vary by data provider.\n\n",
  "sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md": "# BlueBird 8-10 Launch Update\n\n- Ticker: ASTS\n- Source type: secondary; launch/news update\n- Original source: Space.com, \"SpaceX launches 3 huge BlueBird direct-to-cell satellites from Florida\"; Houston Chronicle; Midland Reporter-Telegram; Barron's launch coverage\n- Retrieved: 2026-06-20\n- Coverage period: June 17-20, 2026\n- Reliability: reputable secondary; launch details should be cross-checked with AST SpaceMobile and SpaceX mission pages when available\n\n## Key facts\n\n- Space.com reported that SpaceX launched AST SpaceMobile's BlueBird 8, 9, and 10 satellites on June 17, 2026 from Cape Canaveral Space Force Station using a Falcon 9 rocket.\n- Space.com reported liftoff at 2:39 a.m. EDT and deployment of the satellites into low Earth orbit about an hour after launch.\n- Space.com described BlueBird 8-10 as large next-generation direct-to-cell satellites with antennas around 2,400 square feet, materially larger than prior versions.\n- Houston Chronicle reported that the launch brought AST SpaceMobile's total satellites in orbit to ten including a prototype.\n- Barron's reported that the launch was a meaningful recovery after the April 2026 BlueBird 7 / New Glenn problem, but that full operational confirmation would take several weeks.\n- Barron's reported that AST had nine commercial satellites in orbit after the launch and still needed materially more satellites for its targeted commercial coverage goals.\n- Midland Reporter-Telegram reported that AST plans to ship BlueBird 11-13 soon and has additional satellites in production, including units up to BlueBird 37.\n- Multiple reports framed the launch as progress toward direct-to-device cellular broadband coverage, but not yet proof that the constellation is commercially scaled.\n\n## Useful for future briefs\n\n- Use this source for the latest catalyst and execution update.\n- The key positive signal is launch cadence resuming after the BlueBird 7 setback.\n- The key risk is that \"launched\" is not the same as \"operational\" or \"revenue-generating\"; follow-up confirmation matters.\n- Watch whether BlueBird 11-13 ship and launch on schedule.\n\n## Caveats\n\n- This file summarizes news reports, not the full official launch dossier.\n- Exact operational status, commissioning progress, insurance treatment, and service readiness should be verified through company filings or official investor updates.\n- Barron's may be paywalled; use its headline-level facts only unless a full accessible source is available.\n\n",
  "sources/AAPL/10-k-fy2024.md": "---\nticker: AAPL\nsource_type: 10k_excerpt\nfiscal_year: FY2024\nsource_url: https://www.sec.gov/Archives/edgar/data/320193/000032019324000123/aapl-20240928.htm\n---\n\n# Apple 2024 Form 10-K Excerpt\n\nSource: Apple Inc. Form 10-K for fiscal year ended September 28, 2024, filed with the SEC.\n\n## Item 1: Business / Competition\n\nApple designs and develops most of the integrated solution for its products, including hardware, operating systems, software applications, and related services. The company competes across smartphones, personal computers, tablets, wearables, accessories, and services. Key competitive factors include price, product and service features, security, performance, quality, reliability, design innovation, third-party software and accessories ecosystem, marketing and distribution, service and support, and corporate reputation.\n\nApple notes that its markets are highly competitive, with aggressive price competition, short product life cycles, rapid technology changes, and competitors that may have broader product lines, lower-priced products, larger installed bases, or cost structures that allow products to be sold at little or no profit.\n\n## Item 7: MD&A / Net Sales by Category\n\nNet sales by category for fiscal 2024, 2023, and 2022 (dollars in millions):\n\n| Category | 2024 | Change vs 2023 | 2023 | Change vs 2022 | 2022 |\n|---|---:|---:|---:|---:|---:|\n| iPhone | $201,183 | 0% | $200,583 | -2% | $205,489 |\n| Mac | $29,984 | 2% | $29,357 | -27% | $40,177 |\n| iPad | $26,694 | -6% | $28,300 | -3% | $29,292 |\n| Wearables, Home and Accessories | $37,005 | -7% | $39,845 | -3% | $41,241 |\n| Services | $96,169 | 13% | $85,200 | 9% | $78,129 |\n| Total net sales | $391,035 | 2% | $383,285 | -3% | $394,328 |\n\nManagement commentary in the 10-K says iPhone net sales were relatively flat in 2024 compared with 2023. Mac net sales increased primarily because of higher laptop sales. iPad net sales decreased primarily because of lower iPad Pro and entry-level iPad sales, partly offset by higher iPad Air sales. Wearables, Home and Accessories decreased primarily because of lower Wearables and Accessories sales. Services net sales increased primarily because of higher sales from advertising, the App Store, and cloud services.\n\n## Gross Margin Commentary\n\nThe 10-K states that Products gross margin and Products gross margin percentage increased in 2024 compared with 2023 due to cost savings, partly offset by product mix and foreign currency weakness. Services gross margin increased primarily because of higher Services net sales, while Services gross margin percentage increased because of a different Services mix.\n\n## Item 1A: Risk Factors Excerpt\n\nApple says its business can be materially affected by factors including intense competition, pricing pressure, rapid technology change, product quality issues, supply constraints, dependence on components from single or limited sources, cybersecurity and system disruptions, legal and regulatory proceedings, and gross margin pressure.\n\nSelected risks for brief use:\n\n- Competition and innovation: Apple must keep introducing competitive products, services, and technologies on time. Failure to do so could harm demand, margin, and competitive position.\n- Supply chain and components: Some components are obtained from single or limited sources, and custom components can face capacity constraints during new technology ramps.\n- Product quality and AI features: New and complex technologies, including artificial intelligence features, can increase safety, accuracy, and user-experience risks.\n- Developer ecosystem: Apple depends partly on third-party developers continuing to build and maintain software and services for Apple platforms.\n- Cybersecurity and IT systems: Apple and its global supply chain depend on complex IT systems and face cyberattacks, ransomware, data loss, and operational disruption risks.\n- Legal and regulatory: Government investigations, legal proceedings, and regulatory changes can force changes to business practices, affect privacy/security reputation, and create financial or operational impact.\n- Margin pressure: Gross margins are exposed to pricing pressure, competition, component costs, product mix, foreign exchange, inflation, supply shortages, and regulatory changes.\n",
  "sources/AAPL/transcript.md": "---\nticker: AAPL\nsource_type: earnings_press_release\nquarter: Q2 2026\nsource_url: https://www.apple.com/newsroom/2026/04/apple-reports-second-quarter-results/\n---\n\n# Apple Q2 2026 Earnings Call Transcript\n\n**Date:** April 30, 2026\n**Participants:**\n- Tim Cook (CEO)\n- John Ternus (Incoming CEO)\n- Kevan Parekh (CFO)\n- Suhasini Chandramouli (Director of Investor Relations)\n\n## Executive Summary\nApple reported a record March quarter with revenue of $111.2 billion, up 17% year-over-year. Diluted EPS was $2.01, up 22%. The active installed base reached an all-time high of over 2.5 billion devices.\n\n## Opening Remarks\n\n**Suhasini Chandramouli:**\n\"Good afternoon, and welcome to the Apple Q2 fiscal year 2026 earnings conference call... Speaking first today is Apple's CEO, Tim Cook; John Ternus will be joining after that for a brief set of remarks, and he'll be followed by CFO, Kevan Parekh.\"\n\n**Tim Cook (CEO):**\n\"Good afternoon everyone, and thanks for joining the call. Today Apple is proud to report our best March quarter ever, with revenue of $111.2 billion and double-digit growth across every geographic segment. iPhone achieved a March quarter revenue record, fueled by such extraordinary demand for the iPhone 17 lineup.\"\n\n**John Ternus (Incoming CEO):**\n\"During the quarter, Services achieved yet another all-time record, and we were excited to introduce remarkable new products... Including the addition of the iPhone 17e and the M4-powered iPad Air, along with the launch of MacBook Neo.\"\n\n## Financial Results by Segment\n- **iPhone:** $57 billion (up 22% YoY)\n- **Services:** $31 billion (up 16% YoY) - All-time record\n- **Mac:** $8.4 billion (up 6% YoY)\n- **Gross Margin:** 49.27% (Reported Q2 2026)\n- **Shareholder Returns:** $100 billion new buyback authorized; dividend increased 4%.\n\n## Future Guidance & Management Commentary\n- **Revenue Guidance:** Expected to grow 14% to 17% YoY in the June quarter.\n- **AI Strategy:** Unveiled \"Apple Intelligence\" and Siri AI.\n- **Risk Note:** Over 1.3 billion older iPhones cannot access advanced AI features, potentially limiting the immediate upgrade cycle.\n- **Leadership:** John Ternus to succeed Tim Cook as CEO on September 1, 2026.\n",

        let currentBriefIndex = null;
        const themeLabels = {
            balanced: 'สมดุล',
            forest: 'เขียว',
            graphite: 'กราไฟต์',
            orchid: 'ม่วง'
        };

        function setTheme(theme) {
            const nextTheme = themeLabels[theme] ? theme : 'balanced';
            document.body.dataset.theme = nextTheme;
            localStorage.setItem('stockShowcaseTheme', nextTheme);
            document.querySelectorAll('.theme-button').forEach(button => {
                button.setAttribute('aria-pressed', String(button.dataset.themeOption === nextTheme));
            });
        }

        function sourceCount(item) {
            const text = item.sections.map(sec => sec.html).join(' ');
            const matches = text.match(/source-tag/g);
            return matches ? matches.length : 0;
        }

        function coverageScore(item) {
            const sectionScore = Math.min(item.sections.length, 6) / 6;
            const sourceScore = Math.min(sourceCount(item), 6) / 6;
            const summaryScore = item.summary && !item.summary.includes('No snapshot') ? 1 : 0;
            return Math.round(((sectionScore * 0.48) + (sourceScore * 0.40) + (summaryScore * 0.12)) * 100);
        }

        function sectionValue(item, titleFragment) {
            const section = item.sections.find(sec => sec.title.toLowerCase().includes(titleFragment));
            return section ? Math.min(100, Math.max(18, Math.round(section.html.replace(/<[^>]+>/g, '').length / 12))) : 10;
        }

        function renderSummary() {
            const totalSources = Object.keys(sourcesData).length;
            const scores = briefsData.map(coverageScore);
            const avg = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
            document.getElementById('totalBriefs').textContent = briefsData.length;
            document.getElementById('totalSources').textContent = totalSources;
            document.getElementById('avgCoverage').textContent = `${avg}%`;
            document.getElementById('coverageMap').innerHTML = briefsData.map((item) => {
                const score = coverageScore(item);
                return `<div class="coverage-bar" title="${item.ticker}: ${score}%" style="height:${Math.max(16, score)}%; background:${score > 70 ? 'var(--teal)' : score > 40 ? 'var(--amber)' : 'var(--rose)'}"></div>`;
            }).join('');
        }

        function renderGrid(data) {
            const grid = document.getElementById('briefGrid');
            document.getElementById('statsDisplay').textContent = `แสดง ${data.length} การ์ด`;
            grid.innerHTML = data.map((item) => {
                const realIdx = briefsData.indexOf(item);
                const score = coverageScore(item);
                const srcCount = sourceCount(item);
                const fundamentals = sectionValue(item, 'fundamentals');
                const earnings = sectionValue(item, 'earnings');
                const risk = sectionValue(item, 'kill');
                const chips = [
                    `${item.sections.length} หมวด`,
                    `${srcCount} จุดอ้างอิง`,
                    item.last_updated || 'อัปเดตแล้ว'
                ];
                return `
                <article class="card" onclick="openModal(${realIdx})">
                    <div class="card-top">
                        <div class="ticker">${item.ticker}</div>
                        <div class="badge">${score >= 70 ? 'Source แน่น' : score >= 40 ? 'Source บางส่วน' : 'ต้องเติม Source'}</div>
                    </div>
                    <div class="donut-wrap">
                        <div class="donut" style="--coverage:${score}%" data-score="${score}%"></div>
                        <p class="summary">${item.summary}</p>
                    </div>
                    <div class="signals">
                        <div class="signal"><div class="signal-head"><span>พื้นฐาน</span><span>${fundamentals}%</span></div><div class="track"><div class="fill" style="--w:${fundamentals}%"></div></div></div>
                        <div class="signal"><div class="signal-head"><span>งบล่าสุด</span><span>${earnings}%</span></div><div class="track"><div class="fill" style="--w:${earnings}%"></div></div></div>
                        <div class="signal"><div class="signal-head"><span>ความเสี่ยง</span><span>${risk}%</span></div><div class="track"><div class="fill" style="--w:${risk}%"></div></div></div>
                    </div>
                    <div class="source-strip">${chips.map(chip => `<span class="chip">${chip}</span>`).join('')}</div>
                    <div class="open">เปิด brief ฉบับเต็ม <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                </article>`;
            }).join('');
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toUpperCase();
            const filtered = briefsData.filter(b => b.ticker.includes(q) || b.title.toUpperCase().includes(q));
            renderGrid(filtered);
        }

        function openModal(idx) {
            currentBriefIndex = idx;
            const brief = briefsData[idx];
            document.getElementById('modalTicker').textContent = brief.ticker;
            document.getElementById('modalNav').innerHTML = brief.sections.map((sec, sIdx) => `
                <div class="nav-item ${sIdx === 0 ? 'active' : ''}" onclick="switchSection(${sIdx})">${sec.title}</div>
            `).join('');
            switchSection(0);
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function switchSection(sIdx) {
            const section = briefsData[currentBriefIndex].sections[sIdx];
            document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === sIdx));
            document.getElementById('modalContent').innerHTML = `<h2 class="section-header">${section.title}</h2><div class="section-html">${section.html}</div>`;
        }

        function viewSource(path) {
            document.getElementById('viewerPath').textContent = path;
            document.getElementById('viewerContent').textContent = sourcesData[path] || 'ไม่พบไฟล์ source ใน cache ของเว็บ';
            document.getElementById('sourceViewer').classList.add('active');
        }
        function closeSource() { document.getElementById('sourceViewer').classList.remove('active'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); document.body.style.overflow = ''; }
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('sourceViewer').classList.contains('active')) closeSource();
                else closeModal();
            }
        });
        setTheme(localStorage.getItem('stockShowcaseTheme') || 'balanced');
        renderSummary();
        renderGrid(briefsData);
    </script>
</body>
