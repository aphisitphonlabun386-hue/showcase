<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Risk Showcase - ClaudyOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #161b26;
            --bg-tertiary: #1f2636;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #2e3748;
            --success: #10b981;
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --font-display: 'Outfit', 'Inter', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        header {
            padding: 80px 0 40px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 40%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .subtitle { color: var(--text-secondary); font-size: 1.2rem; max-width: 700px; margin: 0 auto; }

        .controls {
            margin: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .search-bar {
            position: relative;
            flex: 1;
            max-width: 500px;
        }

        .search-bar input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: #fff;
            padding: 16px 20px 16px 50px;
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .stats { color: var(--text-secondary); background: var(--bg-secondary); padding: 12px 24px; border-radius: 12px; border: 1px solid var(--border); }

        .brief-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .card-ticker { font-family: var(--font-display); font-size: 2rem; font-weight: 800; color: #fff; }
        .card-status { font-size: 0.75rem; font-weight: 700; padding: 4px 12px; border-radius: 6px; background: rgba(16, 185, 129, 0.1); color: var(--success); text-transform: uppercase; letter-spacing: 0.05em; }

        .card-preview { color: var(--text-secondary); margin-bottom: 24px; font-weight: 300; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .card-footer { margin-top: auto; display: flex; align-items: center; color: var(--accent); font-weight: 600; gap: 8px; transition: all 0.2s; }
        .card:hover .card-footer { gap: 14px; }

        /* Modal System */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 8, 15, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal {
            background: var(--bg-secondary);
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            border-radius: 24px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal { transform: scale(1); }

        .modal-header { padding: 30px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { display: flex; align-items: center; gap: 20px; }
        .modal-ticker { font-family: var(--font-display); font-size: 2.5rem; font-weight: 800; color: #fff; }
        .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 10px; border-radius: 50%; transition: 0.2s; }
        .modal-close:hover { background: rgba(255,255,255,0.05); color: #fff; }

        .modal-body { padding: 0; display: flex; flex: 1; overflow: hidden; }

        /* Left Sidebar in Modal */
        .modal-nav { width: 250px; border-right: 1px solid var(--border); padding: 30px 20px; background: rgba(255,255,255,0.01); }
        .nav-item { padding: 12px 16px; border-radius: 10px; color: var(--text-secondary); cursor: pointer; margin-bottom: 8px; font-weight: 500; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-item.active { background: var(--accent); color: #fff; }

        /* Right Content in Modal */
        .modal-content { flex: 1; padding: 40px; overflow-y: auto; scrollbar-width: thin; }

        .section-header { font-family: var(--font-display); color: #fff; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        .section-header::before { content: ''; width: 4px; height: 24px; background: var(--accent); border-radius: 2px; }

        .brief-list { list-style: none; margin-bottom: 24px; }
        .brief-list li { position: relative; padding-left: 28px; margin-bottom: 16px; color: var(--text-secondary); }
        .brief-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-weight: bold; }

        .source-tag {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: monospace;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .source-tag.clickable { cursor: pointer; color: var(--accent); border-color: rgba(99,102,241,0.3); }
        .source-tag.clickable:hover { background: rgba(99,102,241,0.1); }

        /* Source Viewer Modal */
        #sourceViewer {
            position: fixed;
            top: 50px; right: 50px; bottom: 50px; left: 50px;
            background: #05070a;
            z-index: 2000;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: none;
            flex-direction: column;
        }
        #sourceViewer.active { display: flex; }
        .viewer-header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .viewer-body { flex: 1; padding: 30px; overflow: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; white-space: pre-wrap; color: #a5b4fc; }

        p { margin-bottom: 16px; color: var(--text-secondary); font-weight: 300; }
        strong { color: #fff; font-weight: 600; }

        @media (max-width: 768px) {
            .modal-body { flex-direction: column; }
            .modal-nav { width: 100%; border-right: none; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 15px; }
            .nav-item { margin-bottom: 0; margin-right: 10px; white-space: nowrap; }
        }
    </style>
</head>

      {
        "id": "1",
        "title": "Company snapshot",
        "html": "<p>Apple (AAPL) เป็นผู้ให้บริการโซลูชันแบบครบวงจรที่รวมฮาร์ดแวร์ (iPhone, Mac, iPad, Wearables), ระบบปฏิบัติการ (iOS, macOS), และบริการ (Services) เข้าด้วยกันอย่างเหนียวแน่น รายได้หลักยังคงมาจาก iPhone (51.4% ของรายได้ปี 2024) แต่กลุ่ม Services (24.6%) เป็นตัวขับเคลื่อนการเติบโตหลักและความได้เปรียบในเชิง <strong>Switching Costs</strong> ที่สูงมากจากการผูกโยงข้อมูลและประสบการณ์ของผู้ใช้ไว้ใน Ecosystem เดียวกัน <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></p>"
      },
      {
        "id": "2",
        "title": "Fundamentals signal",
        "html": "<ul class=\"brief-list\">\n<li><strong>Revenue trend:</strong> รายได้รวมในปี 2024 เติบโตเล็กน้อย 2% โดยที่กลุ่ม Services เติบโตโดดเด่นถึง 13% ชดเชยรายได้จาก iPhone ที่ค่อนข้างคงที่ และกลุ่ม iPad/Wearables ที่มียอดขายลดลง <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></li>\n<li><strong>Margin trend:</strong> Gross Margin มีทิศทางดีขึ้นทั้งในฝั่ง Products (จากการประหยัดต้นทุน) และฝั่ง Services (จากการเติบโตของรายได้และการเปลี่ยนแปลงของส่วนผสมรายได้) <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></li>\n<li><strong>Balance sheet feel:</strong> แข็งแกร่งอย่างยิ่ง ล่าสุดในไตรมาส 2 ปี 2026 มีการอนุมัติวงเงินซื้อหุ้นคืนเพิ่มอีก 100 พันล้านดอลลาร์ และเพิ่มเงินปันผล 4% <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/transcript.md')\">sources/AAPL/transcript.md</span></li>\n<li><strong>Capital allocation pattern:</strong> เน้นการคืนกระแสเงินสดให้ผู้ถือหุ้นผ่านการซื้อหุ้นคืนและปันผลอย่างสม่ำเสมอ โดยมุ่งเน้นการลงทุนในนวัตกรรมและเทคโนโลยีใหม่ๆ เช่น AI เพื่อรักษาตำแหน่งทางการแข่งขัน <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></li>\n</ul>"

      {
        "id": "3",

        "id": "6",
        "title": "What to ask before owning it",
        "html": "<ul class=\"brief-list\">\n<li>คุณเชื่อว่าฟีเจอร์ \"Apple Intelligence\" จะเป็นเหตุผลหลักที่บังคับให้ผู้ใช้ iPhone 1.3 พันล้านเครื่องต้องอัปเกรดเครื่องใหม่ได้จริงหรือไม่?</li>\n<li>การเปลี่ยนตัว CEO เป็น John Ternus จะส่งผลต่อทิศทางนวัตกรรมและการบริหารจัดการเงินทุนของ Apple อย่างไรในระยะยาว?</li>\n<li>Apple จะสามารถรักษาความเป็นส่วนตัว (Privacy) ไปพร้อมกับการใช้ AI ที่ต้องเข้าถึงข้อมูลเชิงลึกของผู้ใช้ได้หรือไม่?</li>\n<li>ราคาหุ้นที่ระดับปัจจุบันได้สะท้อนความคาดหวังเรื่อง AI Supercycle ไปหมดแล้วหรือยัง?</li>\n</ul>"
      }
    ],

    "sections": [

  "sources/ACME_CORP/financials.md": "---\ncompany: ACME CORP\ndocument_type: financial_statement\nfiscal_year: FY2025\nsource_url: internal_upload\n---\n\n# ACME CORP Financial Statement Excerpt (FY2025)\n\n## 1. Key Balance Sheet Figures\n- Cash & Cash Equivalents: $2,000,000 (down from $5,000,000 in FY2024)\n- Total Current Assets: $15,000,000\n- Total Current Liabilities: $12,000,000\n- Total Debt (Short & Long term): $25,000,000\n- Total Shareholders' Equity: $10,000,000\n\n## 2. Key Income Statement Figures\n- Annual Revenue: $48,000,000\n- Gross Profit Margin: 15% (down from 22% in FY2024)\n- Operating Income: -$1,200,000\n- Net Income: -$1,500,000 (Net Loss)\n\n## 3. Financial Analysis Context\n- Current Ratio: 1.25 (Current Assets / Current Liabilities), indicating a tight liquidity position.\n- Debt-to-Equity Ratio: 2.5 ($25,000,000 / $10,000,000), representing very high leverage and solvency risk.\n- Monthly Cash Burn Rate: Average of $500,000 per month.\n- Estimated Cash Runway: 4 months ($2,000,000 cash balance / $500,000 burn rate) unless new financing or partnership cash flow is secured.\n- Accounts Payable Aging: 62 days (payments to suppliers are increasingly delayed).\n",
  "sources/ACME_CORP/registration.md": "---\ncompany: ACME CORP\ndocument_type: registry_compliance\nregistration_date: 2018-04-12\nstatus: Active\n---\n\n# ACME CORP Corporate Registry & Legal Profile\n\n## 1. Registry Details\n- Entity Name: ACME CORP (Registered ID: DE-689320)\n- Place of Incorporation: Delaware, USA\n- Principal Place of Business: Austin, Texas, USA\n- Share Capital: $5,000,000\n- Principal Shareholding Structure:\n  - John Doe (Founder & CEO): 40%\n  - Austin Capital Partners (VC Fund): 35%\n  - Retail & Angel Investors: 25%\n\n## 2. Licenses & Permits\n- Manufacturing License: Active (Expires 2027-12-31)\n- Environmental Operations Clearance: Under Review (Current temporary permit valid until 2026-09-30)\n\n## 3. Pending Litigation & Disputes\n- **Beta Logistics vs. ACME CORP (Case No. TX-2025-CV-8821):** Breach of contract lawsuit filed in Texas District Court by supplier Beta Logistics, seeking $850,000 in unpaid shipping fees and damages. ACME CORP claims services were not delivered according to SLA. Trial date set for November 2026.\n- **Competitor Patent Dispute:** Patent infringement letter received from Prime Inc. regarding proprietary nozzle designs. Dispute is currently in pre-litigation arbitration.\n- **IRS Audit Notification:** IRS notification received regarding a $150,000 mismatch in R&D tax credit claims for FY2024. ACME CORP has appealed and is submitting supporting documentation.\n",
  "sources/MSFT/earnings-summary.md": "# Microsoft (MSFT) Earnings Summary (Q2 FY2026)\n\n**Quarter Ended:** December 31, 2025\n**Release Date:** January 28, 2026\n\n### 1. Key Metrics\n- **Revenue:** $81.3 Billion (+17% YoY).\n- **Microsoft Cloud Revenue:** $51.5 Billion (+26% YoY). First time exceeding $50B in a single quarter.\n- **Operating Income:** $38.3 Billion (+21% YoY).\n- **Diluted EPS (Non-GAAP):** $4.14 (+24% YoY).\n\n### 2. AI & Strategic Highlights\n- **Microsoft 365 Copilot:** 15 million paid seats (+160% QoQ growth).\n- **GitHub Copilot:** 4.7 million paid subscribers (+75% YoY).\n- **OpenAI Investment:** Net gain of $7.6B from investment valuation impact.\n- **Infrastructure:** Added ~1GW of data center capacity during the quarter.\n\n### 3. Management Outlook\n- Continued focus on \"AI monetization\" and transitioning to \"Autonomous Agents.\"\n- Azure growth remains the primary driver despite intense competition.\n- CapEx expected to remain elevated to support multi-year AI demand.\n",
  "sources/MSFT/10-k-summary.md": "# Microsoft (MSFT) 10-K Summary (FY2025)\n\n**Fiscal Year Ended:** June 30, 2025\n**Source:** SEC Filing 10-K (Summary compiled via Research)\n\n### 1. Business Segments\n- **Intelligent Cloud:** Azure, SQL Server, Windows Server, Visual Studio, GitHub, and Enterprise Services. Azure grew 34% in FY25.\n- **Productivity and Business Processes:** Office 365 Commercial, Microsoft 365 Consumer, LinkedIn, and Dynamics business solutions.\n- **More Personal Computing:** Windows OEM, Devices (Surface), Gaming (Xbox content & services, Activision Blizzard), and Search/News Advertising.\n\n### 2. Financial Highlights (FY2025)\n- **Total Revenue:** $281.7 Billion (+15% YoY)\n- **Operating Income:** $128.5 Billion (+17% YoY)\n- **Net Income:** $101.8 Billion (+16% YoY)\n\n### 3. Capital Allocation\n- Approved a new $60 Billion share repurchase program in September 2024.\n- Significant increase in CapEx to support AI infrastructure and data centers.\n\n### 4. Key Risks\n- **AI Infrastructure Costs:** High CapEx requirements for AI scaling.\n- **Cybersecurity:** Potential for major security breaches or outages.\n- **Regulatory Scrutiny:** Antitrust investigations in gaming and cloud.\n- **Competition:** Intense pressure from AWS, Google Cloud, and AI-first startups.\n",
  "sources/AAPL/10-k-fy2024.md": "---\nticker: AAPL\nsource_type: 10k_excerpt\nfiscal_year: FY2024\nsource_url: https://www.sec.gov/Archives/edgar/data/320193/000032019324000123/aapl-20240928.htm\n---\n\n# Apple 2024 Form 10-K Excerpt\n\nSource: Apple Inc. Form 10-K for fiscal year ended September 28, 2024, filed with the SEC.\n\n## Item 1: Business / Competition\n\nApple designs and develops most of the integrated solution for its products, including hardware, operating systems, software applications, and related services. The company competes across smartphones, personal computers, tablets, wearables, accessories, and services. Key competitive factors include price, product and service features, security, performance, quality, reliability, design innovation, third-party software and accessories ecosystem, marketing and distribution, service and support, and corporate reputation.\n\nApple notes that its markets are highly competitive, with aggressive price competition, short product life cycles, rapid technology changes, and competitors that may have broader product lines, lower-priced products, larger installed bases, or cost structures that allow products to be sold at little or no profit.\n\n## Item 7: MD&A / Net Sales by Category\n\nNet sales by category for fiscal 2024, 2023, and 2022 (dollars in millions):\n\n| Category | 2024 | Change vs 2023 | 2023 | Change vs 2022 | 2022 |\n|---|---:|---:|---:|---:|---:|\n| iPhone | $201,183 | 0% | $200,583 | -2% | $205,489 |\n| Mac | $29,984 | 2% | $29,357 | -27% | $40,177 |\n| iPad | $26,694 | -6% | $28,300 | -3% | $29,292 |\n| Wearables, Home and Accessories | $37,005 | -7% | $39,845 | -3% | $41,241 |\n| Services | $96,169 | 13% | $85,200 | 9% | $78,129 |\n| Total net sales | $391,035 | 2% | $383,285 | -3% | $394,328 |\n\nManagement commentary in the 10-K says iPhone net sales were relatively flat in 2024 compared with 2023. Mac net sales increased primarily because of higher laptop sales. iPad net sales decreased primarily because of lower iPad Pro and entry-level iPad sales, partly offset by higher iPad Air sales. Wearables, Home and Accessories decreased primarily because of lower Wearables and Accessories sales. Services net sales increased primarily because of higher sales from advertising, the App Store, and cloud services.\n\n## Gross Margin Commentary\n\nThe 10-K states that Products gross margin and Products gross margin percentage increased in 2024 compared with 2023 due to cost savings, partly offset by product mix and foreign currency weakness. Services gross margin increased primarily because of higher Services net sales, while Services gross margin percentage increased because of a different Services mix.\n\n## Item 1A: Risk Factors Excerpt\n\nApple says its business can be materially affected by factors including intense competition, pricing pressure, rapid technology change, product quality issues, supply constraints, dependence on components from single or limited sources, cybersecurity and system disruptions, legal and regulatory proceedings, and gross margin pressure.\n\nSelected risks for brief use:\n\n- Competition and innovation: Apple must keep introducing competitive products, services, and technologies on time. Failure to do so could harm demand, margin, and competitive position.\n- Supply chain and components: Some components are obtained from single or limited sources, and custom components can face capacity constraints during new technology ramps.\n- Product quality and AI features: New and complex technologies, including artificial intelligence features, can increase safety, accuracy, and user-experience risks.\n- Developer ecosystem: Apple depends partly on third-party developers continuing to build and maintain software and services for Apple platforms.\n- Cybersecurity and IT systems: Apple and its global supply chain depend on complex IT systems and face cyberattacks, ransomware, data loss, and operational disruption risks.\n- Legal and regulatory: Government investigations, legal proceedings, and regulatory changes can force changes to business practices, affect privacy/security reputation, and create financial or operational impact.\n- Margin pressure: Gross margins are exposed to pricing pressure, competition, component costs, product mix, foreign exchange, inflation, supply shortages, and regulatory changes.\n",
  "sources/AAPL/transcript.md": "---\nticker: AAPL\nsource_type: earnings_press_release\nquarter: Q2 2026\nsource_url: https://www.apple.com/newsroom/2026/04/apple-reports-second-quarter-results/\n---\n\n# Apple Q2 2026 Earnings Call Transcript\n\n**Date:** April 30, 2026\n**Participants:**\n- Tim Cook (CEO)\n- John Ternus (Incoming CEO)\n- Kevan Parekh (CFO)\n- Suhasini Chandramouli (Director of Investor Relations)\n\n## Executive Summary\nApple reported a record March quarter with revenue of $111.2 billion, up 17% year-over-year. Diluted EPS was $2.01, up 22%. The active installed base reached an all-time high of over 2.5 billion devices.\n\n## Opening Remarks\n\n**Suhasini Chandramouli:**\n\"Good afternoon, and welcome to the Apple Q2 fiscal year 2026 earnings conference call... Speaking first today is Apple's CEO, Tim Cook; John Ternus will be joining after that for a brief set of remarks, and he'll be followed by CFO, Kevan Parekh.\"\n\n**Tim Cook (CEO):**\n\"Good afternoon everyone, and thanks for joining the call. Today Apple is proud to report our best March quarter ever, with revenue of $111.2 billion and double-digit growth across every geographic segment. iPhone achieved a March quarter revenue record, fueled by such extraordinary demand for the iPhone 17 lineup.\"\n\n**John Ternus (Incoming CEO):**\n\"During the quarter, Services achieved yet another all-time record, and we were excited to introduce remarkable new products... Including the addition of the iPhone 17e and the M4-powered iPad Air, along with the launch of MacBook Neo.\"\n\n## Financial Results by Segment\n- **iPhone:** $57 billion (up 22% YoY)\n- **Services:** $31 billion (up 16% YoY) - All-time record\n- **Mac:** $8.4 billion (up 6% YoY)\n- **Gross Margin:** 49.27% (Reported Q2 2026)\n- **Shareholder Returns:** $100 billion new buyback authorized; dividend increased 4%.\n\n## Future Guidance & Management Commentary\n- **Revenue Guidance:** Expected to grow 14% to 17% YoY in the June quarter.\n- **AI Strategy:** Unveiled \"Apple Intelligence\" and Siri AI.\n- **Risk Note:** Over 1.3 billion older iPhones cannot access advanced AI features, potentially limiting the immediate upgrade cycle.\n- **Leadership:** John Ternus to succeed Tim Cook as CEO on September 1, 2026.\n",

        let currentBriefIndex = null;

        function renderGrid(data) {
            const grid = document.getElementById('briefGrid');
            document.getElementById('statsDisplay').textContent = `${data.length} Assets Tracked`;
            
            grid.innerHTML = data.map((item, idx) => `
                <div class="card" onclick="openModal(${idx})">
                    <div class="card-header">
                        <span class="card-ticker">${item.ticker}</span>
                        ${item.has_check ? '<span class="card-status">Risk Verified</span>' : ''}
                    </div>
                    <div class="card-body">
                        <p class="card-preview">${item.summary}</p>
                    </div>
                    <div class="card-footer">
                        Explore Full Analysis
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </div>
                </div>
            `).join('');
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toUpperCase();
            const filtered = briefsData.filter(b => b.ticker.includes(q) || b.title.toUpperCase().includes(q));
            renderGrid(filtered);
        }

        function openModal(idx) {
            currentBriefIndex = idx;
            const brief = briefsData[idx];
            document.getElementById('modalTicker').textContent = brief.ticker;
            
            const nav = document.getElementById('modalNav');
            nav.innerHTML = brief.sections.map((sec, sIdx) => `
                <div class="nav-item ${sIdx === 0 ? 'active' : ''}" onclick="switchSection(${sIdx})">
                    ${sec.title}
                </div>
            `).join('');

            switchSection(0);
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function switchSection(sIdx) {
            const brief = briefsData[currentBriefIndex];
            const section = brief.sections[sIdx];
            
            // Update UI
            document.querySelectorAll('.nav-item').forEach((el, i) => {
                el.classList.toggle('active', i === sIdx);
            });

            document.getElementById('modalContent').innerHTML = `
                <h2 class="section-header">${section.title}</h2>
                <div class="section-html">${section.html}</div>
            `;
        }

        function viewSource(path) {
            const content = sourcesData[path] || "Source file not found in cache.";
            document.getElementById('viewerPath').textContent = path;
            document.getElementById('viewerContent').textContent = content;
            document.getElementById('sourceViewer').classList.add('active');
        }

        function closeSource() {
            document.getElementById('sourceViewer').classList.remove('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('sourceViewer').classList.contains('active')) closeSource();
                else closeModal();
            }
        });

        renderGrid(briefsData);
    </script>
