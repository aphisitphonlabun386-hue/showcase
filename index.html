<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนที่สรุปหุ้น - ClaudyOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #172033;
            --muted: #667085;
            --line: #d9e2ec;
            --paper: #f6f8fb;
            --panel: #ffffff;
            --navy: #253858;
            --teal: #09867e;
            --accent: #09867e;
            --accent-2: #c44569;
            --green: #2f9e44;
            --amber: #d17a00;
            --rose: #c44569;
            --violet: #6f42c1;
            --cyan: #0b7285;
            --shadow: 0 14px 34px rgba(25, 42, 70, 0.12);
            --font: 'Inter', 'Noto Sans Thai', sans-serif;
        }

        body[data-theme="forest"] {
            --paper: #f4f8f5;
            --navy: #20352c;
            --teal: #0f766e;
            --accent: #0f766e;
            --accent-2: #7c6f2f;
            --amber: #b7791f;
            --rose: #b83280;
            --cyan: #0e7490;
        }

        body[data-theme="graphite"] {
            --paper: #f5f6f8;
            --navy: #1f2937;
            --teal: #2563eb;
            --accent: #2563eb;
            --accent-2: #dc2626;
            --amber: #ca8a04;
            --rose: #be123c;
            --cyan: #0891b2;
        }

        body[data-theme="orchid"] {
            --paper: #f8f6fb;
            --navy: #35264a;
            --teal: #7c3aed;
            --accent: #7c3aed;
            --accent-2: #0f766e;
            --amber: #c27803;
            --rose: #db2777;
            --cyan: #0284c7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background:
                linear-gradient(135deg, color-mix(in srgb, var(--accent) 10%, transparent), transparent 32%),
                linear-gradient(315deg, color-mix(in srgb, var(--accent-2) 10%, transparent), transparent 28%),
                var(--paper);
            color: var(--ink);
            font-family: var(--font);
            line-height: 1.55;
        }

        .shell { max-width: 1240px; margin: 0 auto; padding: 32px 20px 56px; }

        header {
            display: grid;
            grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
            gap: 24px;
            align-items: stretch;
            margin-bottom: 22px;
        }

        .hero-copy, .summary-panel, .controls, .card, .modal, #sourceViewer {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(37, 56, 88, 0.12);
            box-shadow: var(--shadow);
        }

        .hero-copy { padding: 28px; border-radius: 8px; }
        .eyebrow { color: var(--teal); font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.75rem; margin-bottom: 10px; }
        h1 { font-size: clamp(2rem, 5vw, 4.8rem); line-height: 0.98; letter-spacing: 0; color: var(--navy); margin-bottom: 16px; }
        .subtitle { color: var(--muted); max-width: 760px; font-size: 1.05rem; }

        .summary-panel { border-radius: 8px; padding: 22px; display: grid; gap: 14px; }
        .metric-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
        .metric { border: 1px solid var(--line); border-radius: 8px; padding: 14px; background: #fbfcfe; }
        .metric b { display: block; font-size: 1.85rem; line-height: 1; color: var(--navy); }
        .metric span { color: var(--muted); font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
        .coverage-map { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; min-height: 44px; align-items: end; }
        .coverage-bar { border-radius: 6px 6px 3px 3px; min-height: 12px; background: var(--teal); opacity: 0.92; }

        .controls { border-radius: 8px; padding: 14px; display: flex; gap: 14px; align-items: center; margin-bottom: 22px; flex-wrap: wrap; }
        .search-wrap { flex: 1; position: relative; }
        .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
        input {
            width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 13px 14px 13px 44px;
            font: inherit; color: var(--ink); background: #fbfcfe; outline: none;
        }
        input:focus { border-color: var(--teal); box-shadow: 0 0 0 4px rgba(9, 134, 126, 0.12); }
        .view-label { color: var(--muted); font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
        .theme-control { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .theme-title { color: var(--muted); font-weight: 800; font-size: 0.86rem; white-space: nowrap; }
        .theme-button {
            border: 1px solid var(--line);
            background: #fbfcfe;
            color: var(--ink);
            border-radius: 8px;
            padding: 8px 10px;
            min-height: 38px;
            font: inherit;
            font-size: 0.86rem;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
        .theme-button[aria-pressed="true"] { border-color: var(--teal); box-shadow: 0 0 0 3px color-mix(in srgb, var(--teal) 14%, transparent); }
        .swatch { width: 16px; height: 16px; border-radius: 50%; display: inline-block; border: 2px solid white; box-shadow: 0 0 0 1px rgba(23, 32, 51, 0.18); }
        .swatch-balanced { background: linear-gradient(135deg, #09867e 0 48%, #c44569 52%); }
        .swatch-forest { background: linear-gradient(135deg, #0f766e 0 48%, #7c6f2f 52%); }
        .swatch-graphite { background: linear-gradient(135deg, #2563eb 0 48%, #dc2626 52%); }
        .swatch-orchid { background: linear-gradient(135deg, #7c3aed 0 48%, #0f766e 52%); }

        .infographic-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 18px; }
        .card {
            grid-column: span 4;
            border-radius: 8px;
            padding: 18px;
            min-height: 360px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .card:nth-child(5n + 1) { --tone: var(--teal); }
        .card:nth-child(5n + 2) { --tone: var(--violet); }
        .card:nth-child(5n + 3) { --tone: var(--amber); }
        .card:nth-child(5n + 4) { --tone: var(--rose); }
        .card:nth-child(5n + 5) { --tone: var(--cyan); }
        .card::before { content: ''; position: absolute; inset: 0 0 auto; height: 7px; background: var(--tone); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 18px 42px rgba(25, 42, 70, 0.16); }

        .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 16px; padding-top: 8px; }
        .ticker { font-size: 2.5rem; font-weight: 800; color: var(--navy); letter-spacing: 0; line-height: 1; }
        .badge { color: var(--tone); background: color-mix(in srgb, var(--tone) 12%, white); border: 1px solid color-mix(in srgb, var(--tone) 28%, white); border-radius: 8px; padding: 6px 9px; font-size: 0.72rem; font-weight: 800; white-space: nowrap; }

        .donut-wrap { display: grid; grid-template-columns: 106px minmax(0, 1fr); gap: 16px; align-items: center; margin-bottom: 16px; }
        .donut { width: 104px; height: 104px; border-radius: 50%; display: grid; place-items: center; background: conic-gradient(var(--tone) var(--coverage), #e9eef5 0); }
        .donut::after { content: attr(data-score); width: 70px; height: 70px; display: grid; place-items: center; border-radius: 50%; background: white; color: var(--navy); font-size: 1.35rem; font-weight: 800; }
        .summary { color: var(--muted); font-size: 0.93rem; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }

        .signals { display: grid; gap: 10px; margin: 8px 0 16px; }
        .signal { display: grid; gap: 5px; }
        .signal-head { display: flex; justify-content: space-between; color: var(--ink); font-weight: 800; font-size: 0.82rem; }
        .track { height: 9px; background: #e9eef5; border-radius: 999px; overflow: hidden; }
        .fill { height: 100%; width: var(--w); background: var(--tone); border-radius: inherit; }

        .source-strip { margin-top: auto; display: flex; flex-wrap: wrap; gap: 7px; }
        .chip { background: #f1f5f9; color: #475467; border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px; font-size: 0.76rem; font-weight: 700; }
        .open { margin-top: 15px; color: var(--tone); font-weight: 800; display: flex; align-items: center; gap: 8px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(23, 32, 51, 0.62); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; padding: 18px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { width: min(1040px, 100%); height: min(90vh, 900px); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .modal-title { display: flex; align-items: baseline; gap: 12px; }
        .modal-ticker { font-size: 2rem; color: var(--navy); font-weight: 800; }
        .modal-close { border: 1px solid var(--line); background: white; color: var(--muted); border-radius: 10px; padding: 8px; cursor: pointer; }
        .modal-body { display: grid; grid-template-columns: 260px minmax(0, 1fr); min-height: 0; flex: 1; }
        .modal-nav { border-right: 1px solid var(--line); background: #f8fafc; padding: 16px; overflow-y: auto; }
        .nav-item { border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; color: var(--muted); font-weight: 700; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: var(--navy); color: white; }
        .modal-content { padding: 24px; overflow-y: auto; }
        .section-header { color: var(--navy); font-size: 1.45rem; margin-bottom: 16px; }
        .section-html p { color: #344054; margin-bottom: 13px; }
        .brief-list { list-style: none; display: grid; gap: 10px; }
        .brief-list li { color: #344054; padding-left: 20px; position: relative; }
        .brief-list li::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--teal); position: absolute; left: 0; top: 0.7em; }
        strong { color: var(--ink); }
        .source-tag { display: inline-block; margin-left: 6px; color: var(--teal); background: rgba(9, 134, 126, 0.08); border: 1px solid rgba(9, 134, 126, 0.18); border-radius: 6px; padding: 2px 7px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.75rem; }
        .source-tag.clickable { cursor: pointer; }

        #sourceViewer { position: fixed; inset: 42px; z-index: 2000; border-radius: 8px; display: none; flex-direction: column; overflow: hidden; }
        #sourceViewer.active { display: flex; }
        .viewer-header { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
        .viewer-body { flex: 1; padding: 22px; overflow: auto; background: #101828; color: #d1fadf; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.88rem; }

        @media (max-width: 980px) {
            header { grid-template-columns: 1fr; }
            .card { grid-column: span 6; }
        }
        @media (max-width: 700px) {
            .shell { padding: 18px 12px 36px; }
            .controls { flex-direction: column; align-items: stretch; }
            .theme-control { align-items: stretch; }
            .theme-button { justify-content: center; flex: 1 1 calc(50% - 8px); }
            .card { grid-column: span 12; min-height: auto; }
            .donut-wrap { grid-template-columns: 86px 1fr; }
            .donut { width: 86px; height: 86px; }
            .donut::after { width: 58px; height: 58px; font-size: 1.05rem; }
            .metric-row { grid-template-columns: 1fr; }
            .modal-body { grid-template-columns: 1fr; }
            .modal-nav { border-right: 0; border-bottom: 1px solid var(--line); display: flex; overflow-x: auto; }
            .nav-item { white-space: nowrap; margin: 0 7px 0 0; }
            #sourceViewer { inset: 12px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <section class="hero-copy">
                <div class="eyebrow">แผนที่ตลาด ClaudyOS</div>
                <h1>แผนที่สรุปหุ้น</h1>
                <p class="subtitle">ดูภาพรวมงานวิจัยหุ้นแบบอินโฟกราฟิก เห็นความครบของ source, ประเด็นพื้นฐาน, งบล่าสุด และความเสี่ยง ก่อนเปิดอ่าน brief ฉบับเต็ม</p>
            </section>
            <aside class="summary-panel">
                <div class="metric-row">
                    <div class="metric"><b id="totalBriefs">0</b><span>จำนวน Brief</span></div>
                    <div class="metric"><b id="totalSources">0</b><span>ไฟล์ Source</span></div>
                    <div class="metric"><b id="avgCoverage">0%</b><span>ความครบเฉลี่ย</span></div>
                </div>
                <div class="coverage-map" id="coverageMap"></div>
            </aside>
        </header>

        <main>
            <div class="controls">
                <div class="search-wrap">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="searchInput" placeholder="ค้นหาด้วย ticker หรือชื่อ brief..." oninput="handleSearch()">
                </div>
                <div class="theme-control" aria-label="เลือกโทนสี">
                    <span class="theme-title">โทนสี</span>
                    <button class="theme-button" type="button" data-theme-option="balanced" onclick="setTheme('balanced')"><span class="swatch swatch-balanced"></span>สมดุล</button>
                    <button class="theme-button" type="button" data-theme-option="forest" onclick="setTheme('forest')"><span class="swatch swatch-forest"></span>เขียว</button>
                    <button class="theme-button" type="button" data-theme-option="graphite" onclick="setTheme('graphite')"><span class="swatch swatch-graphite"></span>กราไฟต์</button>
                    <button class="theme-button" type="button" data-theme-option="orchid" onclick="setTheme('orchid')"><span class="swatch swatch-orchid"></span>ม่วง</button>
                </div>
                <div class="view-label" id="statsDisplay">กำลังโหลดอินโฟกราฟิก...</div>
            </div>
            <div class="infographic-grid" id="briefGrid"></div>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">
                    <span class="modal-ticker" id="modalTicker">AAPL</span>
                    <span class="badge">สรุปงานวิจัย</span>
                </div>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="modal-nav" id="modalNav"></div>
                <div class="modal-content" id="modalContent"></div>
            </div>
        </div>
    </div>

    <div id="sourceViewer">
        <div class="viewer-header">
            <span id="viewerPath" style="font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--teal);"></span>
            <button class="modal-close" onclick="closeSource()">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="viewer-body" id="viewerContent"></div>
    </div>

    <script>
        const briefsData = [
  {
    "ticker": "AAPL",
    "title": "AAPL Research Brief",
    "summary": "Apple (AAPL) เป็นผู้ให้บริการโซลูชันแบบครบวงจรที่รวมฮาร์ดแวร์ (iPhone, Mac, iPad, Wearables), ระบบปฏิบัติการ (iOS, macOS), และบริการ (Services) เข้...",
    "sections": [
      {
        "id": "1",
        "title": "Company snapshot",
        "html": "<p>Apple (AAPL) เป็นผู้ให้บริการโซลูชันแบบครบวงจรที่รวมฮาร์ดแวร์ (iPhone, Mac, iPad, Wearables), ระบบปฏิบัติการ (iOS, macOS), และบริการ (Services) เข้าด้วยกันอย่างเหนียวแน่น รายได้หลักยังคงมาจาก iPhone (51.4% ของรายได้ปี 2024) แต่กลุ่ม Services (24.6%) เป็นตัวขับเคลื่อนการเติบโตหลักและความได้เปรียบในเชิง <strong>Switching Costs</strong> ที่สูงมากจากการผูกโยงข้อมูลและประสบการณ์ของผู้ใช้ไว้ใน Ecosystem เดียวกัน <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></p>"
      },
      {
        "id": "2",
        "title": "Fundamentals signal",
        "html": "<ul class=\"brief-list\">\n<li><strong>Revenue trend:</strong> รายได้รวมในปี 2024 เติบโตเล็กน้อย 2% โดยที่กลุ่ม Services เติบโตโดดเด่นถึง 13% ชดเชยรายได้จาก iPhone ที่ค่อนข้างคงที่ และกลุ่ม iPad/Wearables ที่มียอดขายลดลง <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></li>\n<li><strong>Margin trend:</strong> Gross Margin มีทิศทางดีขึ้นทั้งในฝั่ง Products (จากการประหยัดต้นทุน) และฝั่ง Services (จากการเติบโตของรายได้และการเปลี่ยนแปลงของส่วนผสมรายได้) <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></li>\n<li><strong>Balance sheet feel:</strong> แข็งแกร่งอย่างยิ่ง ล่าสุดในไตรมาส 2 ปี 2026 มีการอนุมัติวงเงินซื้อหุ้นคืนเพิ่มอีก 100 พันล้านดอลลาร์ และเพิ่มเงินปันผล 4% <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/transcript.md')\">sources/AAPL/transcript.md</span></li>\n<li><strong>Capital allocation pattern:</strong> เน้นการคืนกระแสเงินสดให้ผู้ถือหุ้นผ่านการซื้อหุ้นคืนและปันผลอย่างสม่ำเสมอ โดยมุ่งเน้นการลงทุนในนวัตกรรมและเทคโนโลยีใหม่ๆ เช่น AI เพื่อรักษาตำแหน่งทางการแข่งขัน <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></li>\n</ul>"
      },
      {
        "id": "3",
        "title": "Latest earnings",
        "html": "<ul class=\"brief-list\">\n<li>รายได้รวมในไตรมาสเดือนมีนาคม (Q2 2026) ทำสถิติสูงสุดใหม่ที่ 111.2 พันล้านดอลลาร์ เพิ่มขึ้น 17% เมื่อเทียบกับปีที่ผ่านมา <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/transcript.md')\">sources/AAPL/transcript.md</span></li>\n<li>รายได้จาก iPhone สร้างสถิติใหม่สำหรับไตรมาสมีนาคมที่ 57 พันล้านดอลลาร์ เพิ่มขึ้น 22% จากความต้องการ iPhone 17 <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/transcript.md')\">sources/AAPL/transcript.md</span></li>\n<li>ธุรกิจบริการ (Services) ทำรายได้สูงสุดเป็นประวัติการณ์ที่ 31 พันล้านดอลลาร์ หรือเพิ่มขึ้น 16% <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/transcript.md')\">sources/AAPL/transcript.md</span></li>\n<li>อัตรากำไรขั้นต้น (Gross Margin) รายงานอยู่ที่ 49.27% ในไตรมาสล่าสุด <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/transcript.md')\">sources/AAPL/transcript.md</span></li>\n<li>ประกาศแผนสืบทอดตำแหน่ง CEO โดย John Ternus จะขึ้นดำรงตำแหน่งแทน Tim Cook ในวันที่ 1 กันยายน 2026 <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/transcript.md')\">sources/AAPL/transcript.md</span></li>\n</ul>"
      },
      {
        "id": "4",
        "title": "Bull case / Bear case",
        "html": "<ul class=\"brief-list\">\n<li><strong>Bull case:</strong> รอบการอัปเกรด AI iPhone (Apple Intelligence) ที่คาดว่าจะมาพร้อมกับ iOS 18 และดีลร่วมกับ OpenAI เพื่อนำ ChatGPT มาอัปเกรด Siri รวมถึงการฟื้นตัวอย่างรุนแรงของยอดขาย iPhone ในจีนที่พุ่งสูงถึง 52% ในเดือนเมษายน 2024 <span class=\"source-tag\">Yi Market Intel</span></li>\n<li><strong>Bear case:</strong> ความเสี่ยงด้านกฎหมายผูกขาด (Antitrust) จากกระทรวงยุติธรรมสหรัฐฯ และ EU ที่อาจบีบให้ต้องเปลี่ยนโมเดลธุรกิจ และความกังวลเรื่องรอบการเปลี่ยนเครื่องหากฟีเจอร์ AI ไม่น่าดึงดูดพอสำหรับผู้ใช้ iPhone รุ่นเก่ากว่า 1.3 พันล้านเครื่องที่ไม่รองรับ AI ขั้นสูง <span class=\"source-tag\">Yi & Shen Analysis</span></li>\n</ul>"
      },
      {
        "id": "5",
        "title": "Kill conditions",
        "html": "<ul class=\"brief-list\">\n<li>ผลประกอบการภาคบริการ (Services) ลดลงอย่างต่อเนื่องจากการเปลี่ยนแปลงกฎระเบียบที่บีบให้ต้องเปิดระบบหรือลดค่าธรรมเนียม App Store <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></li>\n<li>ความล้มเหลวในการพัฒนานวัตกรรม AI ที่น่าประทับใจในงาน WWDC จนทำให้เสียตำแหน่งทางการแข่งขัน <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></li>\n<li>ปัญหาด้านห่วงโซ่อุปทานขั้นรุนแรงจากการพึ่งพาผู้ผลิตจำกัดรายสำหรับส่วนประกอบสำคัญ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/AAPL/10-k-fy2024.md')\">sources/AAPL/10-k-fy2024.md</span></li>\n</ul>"
      },
      {
        "id": "6",
        "title": "What to ask before owning it",
        "html": "<ul class=\"brief-list\">\n<li>คุณเชื่อว่าฟีเจอร์ \"Apple Intelligence\" จะเป็นเหตุผลหลักที่บังคับให้ผู้ใช้ iPhone 1.3 พันล้านเครื่องต้องอัปเกรดเครื่องใหม่ได้จริงหรือไม่?</li>\n<li>การเปลี่ยนตัว CEO เป็น John Ternus จะส่งผลต่อทิศทางนวัตกรรมและการบริหารจัดการเงินทุนของ Apple อย่างไรในระยะยาว?</li>\n<li>Apple จะสามารถรักษาความเป็นส่วนตัว (Privacy) ไปพร้อมกับการใช้ AI ที่ต้องเข้าถึงข้อมูลเชิงลึกของผู้ใช้ได้หรือไม่?</li>\n<li>ราคาหุ้นที่ระดับปัจจุบันได้สะท้อนความคาดหวังเรื่อง AI Supercycle ไปหมดแล้วหรือยัง?</li>\n</ul>"
      }
    ],

    "ticker": "ASTS",
    "title": "ASTS Research Brief",
    "summary": "\nAST SpaceMobile เป็นบริษัท low Earth orbit direct-to-device cellular broadband ที่ต้องการให้มือถือทั่วไปเชื่อมต่อดาวเทียมได้โดยไม่ต้องใช้อุปกรณ์พิ...",
    "sections": [
      {
        "id": "1",
        "title": "Company snapshot",
        "html": "<ul class=\"brief-list\">\n<li>AST SpaceMobile เป็นบริษัท low Earth orbit direct-to-device cellular broadband ที่ต้องการให้มือถือทั่วไปเชื่อมต่อดาวเทียมได้โดยไม่ต้องใช้อุปกรณ์พิเศษ เน้นพื้นที่ที่เสาสัญญาณภาคพื้นดินไปไม่ถึง <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n<li>Thesis ของธุรกิจยังอยู่ช่วงแปลง milestone ทางเทคนิคและ partnership ให้เป็น commercial revenue จริง โดยต้อง deploy ดาวเทียมให้พอมี coverage ก่อนจึงจะพิสูจน์โมเดลได้เต็มที่ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n<li>จุดแข็งเชิง distribution คือความสัมพันธ์กับ mobile network operators รายใหญ่ เช่น AT&T, Verizon, Vodafone, Google/Rakuten ecosystem และรายงานข่าวระบุว่ามีข้อตกลงกับ operator เกือบ 60 ราย ครอบคลุมผู้ใช้กว่า 3 พันล้านคนทั่วโลก <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n<li>เป้าหมายเชิง network ที่สื่อรายงานคือประมาณ 45 ดาวเทียมสำหรับ coverage เชิงพาณิชย์บางตลาด และประมาณ 90 ดาวเทียมสำหรับ continuous global coverage ซึ่งทำให้ launch cadence เป็นตัวแปรสำคัญมาก <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n</ul>"
      },
      {
        "id": "2",
        "title": "Fundamentals signal",
        "html": "<ul class=\"brief-list\">\n<li>พื้นฐานยังเป็น early-stage/high-capex: รายได้เริ่มมีแล้ว แต่ธุรกิจยังไม่ใช่บริษัทกำไรสม่ำเสมอ และมูลค่าหุ้นสะท้อนความคาดหวังว่าบริษัทจะ scale constellation ได้สำเร็จ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li>Q1 2026 revenue ที่สื่อรายงานอยู่ราว $14.7M เพิ่มจากราว $718K ปีก่อน แต่ต่ำกว่า analyst estimate ประมาณ $39M ทำให้ภาพ growth ยังดีแต่ execution เทียบ expectation ยังน่ากังวล <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li>Loss ยังหนัก: รายงานระบุ loss per share ราว $0.66 และ net loss ราว $191M ใน Q1 2026 จึงต้องจับตา cash burn, financing, และ dilution มากเป็นพิเศษ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li>ความเสี่ยงโครงสร้างคือ launch failure/delay, regulatory/spectrum approval, commercial adoption, funding need, และการแข่งขันจาก satellite-to-cell players ที่มี scale สูงกว่า เช่น Starlink Mobile <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n</ul>"
      },
      {
        "id": "3",
        "title": "Latest earnings",
        "html": "<ul class=\"brief-list\">\n<li>Q1 2026 เป็น quarter ที่ตลาดผิดหวังจาก revenue miss และ loss ที่กว้างกว่าคาด แม้ revenue โตจากฐานต่ำเมื่อเทียบปีก่อน <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li>Management ยังรักษา full-year 2026 revenue guidance ราว $150M-$200M แต่ความน่าเชื่อถือของ guidance จะขึ้นกับการเปิดบริการเชิงพาณิชย์และจำนวนดาวเทียมที่ operational จริง ไม่ใช่แค่ launched <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li>ข่าวล่าสุดเชิงบวกคือ BlueBird 8, 9, และ 10 ถูก launch ด้วย Falcon 9 วันที่ 17 มิถุนายน 2026 และถูก deploy เข้าสู่ low Earth orbit ซึ่งช่วยกู้ momentum หลัง BlueBird 7 setback <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md')\">sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md</span></li>\n<li>จุดที่ยังต้องรอคือ commissioning/operational confirmation เพราะรายงานข่าวระบุว่าต้องใช้เวลาหลายสัปดาห์ในการยืนยันสถานะการทำงานเต็มรูปแบบ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md')\">sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md</span></li>\n</ul>"
      },
      {
        "id": "4",
        "title": "Bull case / Bear case",
        "html": "<ul class=\"brief-list\">\n<li><strong>Bull case:</strong> ถ้า ASTS รักษา launch cadence ได้, BlueBird รุ่นใหม่ operational ตามแผน, และ operator partners เปิดบริการจริง บริษัทมีโอกาสเปลี่ยนจาก story stock เป็น infrastructure platform ที่มี distribution ผ่าน telco เดิม <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n<li><strong>Bull case:</strong> การ launch BlueBird 8-10 สำเร็จหลัง BlueBird 7 anomaly ช่วยลดความกังวลระยะสั้นว่า deployment plan หยุดชะงัก และแสดงว่าบริษัทยังเดินหน้าผ่าน launch provider หลายรายได้ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md')\">sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md</span></li>\n<li><strong>Bull case:</strong> ถ้า guidance $150M-$200M ปี 2026 ทำได้จริง จะเป็นสัญญาณว่ารายได้เริ่มเปลี่ยนจาก milestone/contract เฉพาะจุดไปสู่ commercial ramp ที่จับต้องได้ขึ้น <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li><strong>Bear case:</strong> รายได้ Q1 2026 ต่ำกว่าคาดมากเมื่อเทียบกับ expectation และ loss ยังสูง ถ้า commercial rollout เลื่อนอีก หุ้นอาจถูกมองเป็นธุรกิจทุนหนักที่ต้องระดมทุนต่อเนื่องมากกว่าจะเป็น platform ที่ scale ใกล้แล้ว <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li><strong>Bear case:</strong> BlueBird 7 ที่คาดว่าจะ de-orbit หลัง New Glenn anomaly เป็นหลักฐานว่า launch risk ยังไม่ใช่เรื่องทฤษฎี แม้ insurance อาจช่วยเรื่องต้นทุน asset แต่เวลา deployment ที่เสียไปมีผลต่อ thesis <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n<li><strong>Bear case:</strong> SpaceX/Starlink Mobile เป็นคู่แข่งเชิง narrative และ execution ที่น่ากลัว เพราะมี launch stack, capital, และ manufacturing scale สูงกว่า <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n</ul>"
      },
      {
        "id": "5",
        "title": "Kill conditions",
        "html": "<ul class=\"brief-list\">\n<li>ดาวเทียมที่ launch แล้วไม่สามารถเปลี่ยนเป็น operational capacity ได้ตามเวลา หรือ BlueBird 11-13 และชุดถัดไปเลื่อนซ้ำจนเป้าหมาย coverage หลุดกรอบเดิม <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md')\">sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md</span></li>\n<li>Full-year 2026 revenue guidance $150M-$200M ถูกปรับลง หรือรายได้ที่เกิดจริงไม่สะท้อนการเริ่ม commercial service ตามที่ตลาดคาด <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li>Cash burn และ net loss บังคับให้บริษัทเพิ่มทุน/ออกหนี้แปลงสภาพซ้ำจน dilution กิน upside ของผู้ถือหุ้นเดิม <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li>Telco partnerships ไม่กลายเป็น usage/revenue ที่ material หรือเงื่อนไข partnership จำกัดกว่าที่ตลาดตีความ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n<li>คู่แข่ง direct-to-cell เปิดบริการได้เร็วกว่าและทำให้ ASTS เสีย bargaining power กับ mobile operators <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n</ul>"
      },
      {
        "id": "6",
        "title": "What to ask before owning it",
        "html": "<ul class=\"brief-list\">\n<li>ปัจจุบันมีดาวเทียมกี่ดวงที่ operational จริง ไม่ใช่แค่ launched และแต่ละดวงรองรับ coverage/capacity ได้แค่ไหน? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md')\">sources/ASTS/news-2026-06-17-bluebird-8-10-launch.md</span></li>\n<li>รายได้ guidance ปี 2026 มาจาก committed contracts, prepayments, government revenue, หรือ usage-based commercial service สัดส่วนเท่าไร? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li>บริษัทมี liquidity พอถึง commercial scale โดยไม่ต้อง dilution หนักอีกหรือไม่ และ cash burn หลัง production/launch cadence เร่งขึ้นจะเป็นเท่าไร? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/earnings-summary-q1-2026.md')\">sources/ASTS/earnings-summary-q1-2026.md</span></li>\n<li>Partnership กับ AT&T, Verizon, Vodafone และ operator อื่นมี economics แบบใด ใครเป็นเจ้าของลูกค้า ใครเก็บเงิน และ ASTS ได้ revenue share เท่าไร? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n<li>ถ้า Starlink Mobile หรือคู่แข่งอื่นทำบริการ direct-to-cell ได้เร็วกว่าคาด ASTS ยังมี moat อะไรนอกจากความสัมพันธ์กับ telco partners? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ASTS/market-info.md')\">sources/ASTS/market-info.md</span></li>\n</ul>"
      }
    ],

  {
    "ticker": "EOSE",
    "title": "EOSE Research Brief",
    "summary": "\nEos Energy Enterprises เป็นผู้ผลิตระบบกักเก็บพลังงานระยะยาวแบบ zinc-based BESS สำหรับ utility-scale, microgrid, commercial และ industrial applicat...",
    "sections": [
      {
        "id": "1",
        "title": "Company snapshot",
        "html": "<ul class=\"brief-list\">\n<li>Eos Energy Enterprises เป็นผู้ผลิตระบบกักเก็บพลังงานระยะยาวแบบ zinc-based BESS สำหรับ utility-scale, microgrid, commercial และ industrial applications โดยบริษัทวางตำแหน่ง Znyth technology เป็นทางเลือก non-lithium/non-flammable สำหรับงาน 4-16+ ชั่วโมง <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/market-info.md')\">sources/EOSE/market-info.md</span></li>\n<li>Thesis หลักของ EOSE คือการเปลี่ยนจากเทคโนโลยีและ backlog ให้เป็นการผลิตซ้ำได้จริงในโรงงาน, ส่งมอบได้ตามแผน, และทำ margin ให้ดีขึ้นเมื่อ scale เพิ่ม <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/market-info.md')\">sources/EOSE/market-info.md</span></li>\n<li>บริษัทกำลังขยายกำลังผลิตผ่าน Battery Line 2 ที่ Thorn Hill และตั้งเป้าไปสู่ 4 GWh annual manufacturing capacity ภายในสิ้นปี 2026 <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-16-second-manufacturing-facility.md')\">sources/EOSE/news-2026-06-16-second-manufacturing-facility.md</span></li>\n<li>ฝั่ง demand มีตัวเร่งจาก Frontier Power USA, Redbird project, CAPAC Energy ใน DACH region และ pipeline/backlog ที่บริษัทประกาศไว้ แต่ต้องพิสูจน์ว่าแปลงเป็นรายได้และ cash flow ได้จริง <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-17-18-commercial-orders.md')\">sources/EOSE/news-2026-06-17-18-commercial-orders.md</span></li>\n</ul>"
      },
      {
        "id": "2",
        "title": "Fundamentals signal",
        "html": "<ul class=\"brief-list\">\n<li>Q1 2026 revenue อยู่ที่ $57.0M เพิ่มขึ้น 445% YoY และบริษัทระบุว่าสองไตรมาสล่าสุดมีรายได้รวมกันสูงกว่ารายได้ทั้งปี 2025 แล้ว <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Gross loss ยังติดลบ $44.4M แต่ margin ดีขึ้น 157 percentage points YoY และดีขึ้น 16 points QoQ สะท้อนว่า manufacturing efficiency กำลังดีขึ้นแต่ยังไม่ถึงจุดกำไรขั้นต้นบวก <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Adjusted EBITDA loss ยังอยู่ที่ $68.0M ใน Q1 2026 แปลว่าบริษัทแม้ scale เร็วขึ้น แต่ยังใช้เงินสดและยังไม่ใช่ธุรกิจที่ self-funding ได้ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Cash รวม restricted cash อยู่ที่ $472.4M ณ 31 มีนาคม 2026 ซึ่งช่วยลด near-term liquidity pressure แต่ต้องเทียบกับ cash burn และเงินที่ต้องใช้ใน Frontier Power USA / manufacturing ramp <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Backlog อยู่ที่ $644.6M หรือ 2.6 GWh และ commercial opportunity pipeline อยู่ที่ $24.3B เพิ่มขึ้น 56% YoY จุดสำคัญคือคุณภาพและ conversion rate ของ pipeline ไม่ใช่แค่ตัวเลข headline <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n</ul>"
      },
      {
        "id": "3",
        "title": "Latest earnings",
        "html": "<ul class=\"brief-list\">\n<li>Q1 2026 เป็น quarter ที่รายได้เติบโตแรงและบริษัท reaffirm full-year 2026 revenue guidance ที่ $300M-$400M <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Production metrics ทำสถิติใหม่ทั้ง shipments, battery output และ bipolar manufacturing และ Eos ระบุว่า technology ของบริษัท surpassed 6.0 GWh of discharged energy <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Frontier Power USA ถูกประกาศพร้อม Q1 results โดยมี Cerberus เป็น partner และมี 2 GWh firm capacity reservation agreement ซึ่งเป็นกลไกสำคัญในการแปลง project pipeline ให้กลายเป็น orders <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>หลัง Q1 บริษัทประกาศ commercial production ที่ Battery Line 2 วันที่ 16 มิถุนายน 2026 ซึ่งช่วยสนับสนุน narrative ว่าการผลิตเริ่ม replicate ได้ แต่ full production ยัง target ใน Q4 2026 <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-16-second-manufacturing-facility.md')\">sources/EOSE/news-2026-06-16-second-manufacturing-facility.md</span></li>\n<li>ข่าวล่าสุดเชิง commercial คือ CAPAC Energy agreement ใน DACH region และ Redbird 100 MW / 400 MWh purchase order ภายใต้ Frontier Power USA ซึ่งเป็นสัญญาณว่า framework เริ่มมี conversion เป็น project/order มากขึ้น <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-17-18-commercial-orders.md')\">sources/EOSE/news-2026-06-17-18-commercial-orders.md</span></li>\n</ul>"
      },
      {
        "id": "4",
        "title": "Bull case / Bear case",
        "html": "<ul class=\"brief-list\">\n<li><strong>Bull case:</strong> ถ้า Eos ทำ Battery Line 2 ramp ได้ตามแผนและไปถึง 4 GWh annual capacity ภายในสิ้นปี 2026 บริษัทจะลด execution risk ของ manufacturing scale-up ลงมาก <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-16-second-manufacturing-facility.md')\">sources/EOSE/news-2026-06-16-second-manufacturing-facility.md</span></li>\n<li><strong>Bull case:</strong> Backlog $644.6M, pipeline $24.3B, Frontier Power USA, Redbird และ CAPAC agreement ให้ภาพว่า demand มีอยู่จริงและเริ่มมี order conversion มากกว่าแค่ story <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span> <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-17-18-commercial-orders.md')\">sources/EOSE/news-2026-06-17-18-commercial-orders.md</span></li>\n<li><strong>Bull case:</strong> Zinc-based long-duration storage ที่ non-lithium/non-flammable อาจมี niche แข็งใน utility/grid/data-center/industrial workloads ที่ต้องการ duration 4-16+ ชั่วโมงและ domestic supply chain <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/market-info.md')\">sources/EOSE/market-info.md</span></li>\n<li><strong>Bear case:</strong> Gross loss และ adjusted EBITDA loss ยังสูงมาก หาก margin improvement ไม่ต่อเนื่อง การเติบโตของรายได้อาจยิ่งทำให้ burn cash มากขึ้นแทนที่จะสร้าง operating leverage <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li><strong>Bear case:</strong> Pipeline และ framework agreement ไม่เท่ากับ revenue; project financing, customer delays, permitting, grid interconnection และ purchase order timing อาจทำให้ conversion ช้ากว่าที่ตลาดคาด <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-17-18-commercial-orders.md')\">sources/EOSE/news-2026-06-17-18-commercial-orders.md</span></li>\n<li><strong>Bear case:</strong> Frontier Power USA ต้องพึ่ง closing conditions, funding ability, approvals และ Cerberus/third-party capital หากโครงสร้างนี้ล่าช้าหรือเปลี่ยนเงื่อนไข thesis ฝั่ง commercial acceleration จะอ่อนลง <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n</ul>"
      },
      {
        "id": "5",
        "title": "Kill conditions",
        "html": "<ul class=\"brief-list\">\n<li>Gross margin ไม่สามารถเข้าใกล้ breakeven หรือเป็นบวกได้เมื่อ revenue scale ขึ้น ทำให้ทุกยอดขายยังเผาเงินเพิ่ม <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Battery Line 2 ไม่สามารถ ramp ตาม timeline หรือ full production ใน Q4 2026 หลุดกรอบอย่างมีนัยสำคัญ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-16-second-manufacturing-facility.md')\">sources/EOSE/news-2026-06-16-second-manufacturing-facility.md</span></li>\n<li>Backlog $644.6M และ pipeline $24.3B ไม่แปลงเป็น shipments/revenue ตามช่วงเวลาที่บริษัทสื่อสาร <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Frontier Power USA หรือ Redbird/CAPAC projects ติด funding, closing conditions, approvals, หรือ project execution จน order conversion ชะงัก <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-17-18-commercial-orders.md')\">sources/EOSE/news-2026-06-17-18-commercial-orders.md</span></li>\n<li>Cash burn เร็วกว่าคาดจนต้องเพิ่มทุนหรือออก financing ที่ dilute ผู้ถือหุ้นหนักก่อนธุรกิจพิสูจน์ margin ได้ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n</ul>"
      },
      {
        "id": "6",
        "title": "What to ask before owning it",
        "html": "<ul class=\"brief-list\">\n<li>Gross margin จะดีขึ้นต่อเนื่องจาก -78.0% ใน Q1 2026 ไปสู่ breakeven ได้เมื่อไร และต้องใช้ volume เท่าไร? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Battery Line 2 หลังเริ่ม commercial production จะ ramp ได้จริงตาม Q3/Q4 milestones หรือไม่ และมี defect/yield/cost per unit เท่าไร? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-16-second-manufacturing-facility.md')\">sources/EOSE/news-2026-06-16-second-manufacturing-facility.md</span></li>\n<li>Backlog $644.6M มี cancelation risk, financing risk, และ expected delivery schedule อย่างไร? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>Frontier Power USA ต้องใช้เงินจาก Eos ประมาณ $150M อย่างไร และจะกระทบ cash runway/dilution แค่ไหน? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/earnings-summary-q1-2026.md')\">sources/EOSE/earnings-summary-q1-2026.md</span></li>\n<li>CAPAC, Redbird และ pipeline 12 GWh จะกลายเป็น purchase orders/revenue ในปีไหน และมี margin profile ดีกว่างานเดิมหรือไม่? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/EOSE/news-2026-06-17-18-commercial-orders.md')\">sources/EOSE/news-2026-06-17-18-commercial-orders.md</span></li>\n</ul>"

    "sections": [
      {

        "html": "<p>Microsoft (MSFT) เป็นผู้ให้บริการเทคโนโลยีระดับโลกที่ครอบคลุมทั้งซอฟต์แวร์ ฮาร์ดแวร์ และบริการคลาวด์ ปัจจุบันบริษัทได้ทรานส์ฟอร์มตัวเองสู่การเป็น \"AI-first company\" โดยมีรายได้หลักจาก 3 กลุ่ม ได้แก่ <strong>Intelligent Cloud</strong> (Azure), <strong>Productivity and Business Processes</strong> (Office 365, LinkedIn) และ <strong>More Personal Computing</strong> (Windows, Gaming, Search) ด้วยการผนวกโมเดล AI ของ OpenAI เข้ากับทุกผลิตภัณฑ์ ทำให้ Microsoft มีความได้เปรียบเชิงนิเวศน์ (Ecosystem) ที่แข็งแกร่งที่สุดรายหนึ่งในโลก</p>"

      {
        "id": "2",

        "html": "<ul class=\"brief-list\">\n<li><strong>Revenue trend:</strong> เติบโตอย่างแข็งแกร่ง (FY2025 รายได้ $281.7B, +15% YoY) ขับเคลื่อนโดย Azure ที่เติบโตกว่า 34% และการรับรู้รายได้จาก Activision Blizzard</li>\n<li><strong>Margin trend:</strong> Gross Margin ยังอยู่ในระดับสูง (ประมาณ 69% สำหรับกลุ่ม Cloud) แต่เริ่มเผชิญความกดดันจากค่าใช้จ่ายด้านโครงสร้างพื้นฐาน AI (CapEx) ที่พุ่งสูงขึ้น</li>\n<li><strong>Balance sheet feel:</strong> แข็งแกร่งอย่างยิ่ง มีกระแสเงินสดอิสระมหาศาล และมีแผนซื้อหุ้นคืนมูลค่า $60B (อนุมัติ ก.ย. 2024)</li>\n<li><strong>Capital allocation pattern:</strong> เน้นการลงทุนหนักใน AI Data Centers ควบคู่ไปกับการคืนเงินปันผลและซื้อหุ้นคืน <span class=\"source-tag clickable\" onclick=\"viewSource('sources/MSFT/10-k-summary.md')\">sources/MSFT/10-k-summary.md</span></li>\n</ul>"
      },
      {
        "id": "3",
        "title": "Latest earnings (Q2 FY2026 - Jan 2026)",

      },

        "title": "Market Context & Sentiment (As of June 15, 2026)",
        "html": "<ul class=\"brief-list\">\n<li><strong>Latest News:</strong> ตลาดจับตาการปรับกลยุทธ์สู่ \"Agent-native\" architecture และการเปิดตัว Surface RTX Spark สำหรับรัน AI Model ขนาดใหญ่ในเครื่อง</li>\n<li><strong>Analyst Sentiment:</strong> ส่วนใหญ่แนะนำ \"Strong Buy\" มองว่าการปรับฐานของราคาหุ้นในเดือน มิ.ย. เป็นโอกาสเข้าซื้อที่ดี เนื่องจาก AI business มี Run rate รายได้แตะ $37B แล้ว (+123% YoY)</li>\n<li><strong>Risks:</strong> ความกังวลเรื่องการเติบโตของ Azure ที่อาจชะลอตัวลงเล็กน้อย และคดีฟ้องร้องจากผู้ถือหุ้นเกี่ยวกับการเปิดเผยข้อมูลการเติบโตของ AI <span class=\"source-tag\">Yi Market Intel</span></li>\n</ul>"
      },
      {
        "id": "5",
        "title": "Bull case / Bear case",
        "html": "<ul class=\"brief-list\">\n<li><strong>Bull case:</strong> การเปลี่ยนผ่านจาก \"AI Features\" สู่ \"Autonomous Agents\" จะสร้างรอบการเติบโตระลอกใหม่ และความสามารถในการรักษาความเป็นผู้นำในตลาด Cloud AI</li>\n<li><strong>Bear case:</strong> การแข่งขันที่รุนแรงจาก AWS และ Google Cloud รวมถึงความกดดันต่ออัตรากำไร (Margin) หากการลงทุน CapEx มหาศาลไม่สามารถสร้าง ROI ได้ตามเป้าในระยะยาว</li>\n</ul>"
      },
      {
        "id": "6",
        "title": "Kill conditions",
        "html": "<ul class=\"brief-list\">\n<li>อัตราการเติบโตของ Azure ลดลงต่ำกว่า 25% ต่อเนื่อง 2 ไตรมาส</li>\n<li>ปัญหาด้านความปลอดภัยทางไซเบอร์ (Security Breach) รุนแรงในระบบ Azure หรือ Teams จนเสียความเชื่อมั่นจากลูกค้าองค์กร</li>\n<li>กฎระเบียบ Antitrust ที่เข้มงวดขึ้นจนบีบให้ต้องแยกธุรกิจหรือจำกัดการควบรวมกิจการในอนาคต</li>\n</ul>"

        "title": "What to ask before owning it",

    "sections": [
      {
        "id": "1",
        "title": "Company snapshot",
        "html": "<p>Realty Income (O) หรือที่รู้จักกันในนาม \"The Monthly Dividend Company®\" เป็นกองทรัสต์เพื่อการลงทุนในอสังหาริมทรัพย์ (REIT) ในดัชนี S&P 500 ที่เน้นอสังหาริมทรัพย์เชิงพาณิชย์แบบผู้เช่ารายเดียว (Single-tenant) ภายใต้สัญญาเช่าแบบ Triple-net (ผู้เช่ารับผิดชอบภาษี ประกัน และค่าบำรุงรักษา) บริษัทมีพอร์ตทรัพย์สินกว่า 15,450 แห่ง กระจายอยู่ใน 50 รัฐของสหรัฐฯ และ 10 ประเทศในยุโรป โดยมีจุดเด่นคือการจ่ายเงินปันผลทุกเดือนและเพิ่มปันผลต่อเนื่องมาอย่างยาวนานกว่า 30 ปี</p>"
      },
      {
        "id": "2",
        "title": "Fundamentals signal",
        "html": "<ul class=\"brief-list\">\n<li><strong>Portfolio Stability:</strong> อัตราการเช่า (Occupancy) สูงถึง 98.7% โดยกว่า 32.4% ของรายได้มาจากผู้เช่าระดับ Investment-grade (เช่น 7-Eleven, Walgreens, Dollar General)</li>\n<li><strong>Growth Engine:</strong> หลังการควบรวมกิจการ Spirit Realty มูลค่า $9.3B ในปี 2024 ทำให้บริษัทมีขนาดที่ใหญ่ขึ้นและกระจายความเสี่ยงได้ดีขึ้นมาก รวมถึงการขยายตัวในยุโรปที่มีอัตราผลตอบแทนสูงกว่า</li>\n<li><strong>Balance Sheet:</strong> แข็งแกร่งด้วย Credit Rating ระดับ A3/A- โดยมีอัตราส่วน Net Debt-to-EBITDA ที่ 5.4x และ Fixed Charge Coverage ที่ 4.7x</li>\n<li><strong>Dividend Reliability:</strong> จ่ายปันผลต่อเนื่อง 652 เดือน และเป็นหนึ่งใน Dividend Aristocrats <span class=\"source-tag clickable\" onclick=\"viewSource('sources/O/10-k-summary.md')\">sources/O/10-k-summary.md</span></li>\n</ul>"
      },
      {
        "id": "3",
        "title": "Latest earnings (FY2024 / Q1 2025 Context)",
        "html": "<ul class=\"brief-list\">\n<li><strong>Operational Return:</strong> ในปี 2024 บริษัทสร้างผลตอบแทนจากการดำเนินงานได้ 10.2% (AFFO Growth + Dividend Yield)</li>\n<li><strong>Recapture Rate:</strong> ในปี 2024 บริษัทสามารถต่อสัญญาเช่าได้ในอัตรา 105.6% ของค่าเช่าเดิม สะท้อนถึงคุณภาพและความต้องการในสินทรัพย์</li>\n<li><strong>Acquisition Strategy:</strong> มีการทำ Joint Venture มูลค่ารวมกว่า $2.5B กับสถาบันอย่าง Apollo และ GIC เพื่อใช้เงินทุนจากภายนอก (Private Capital) ในการขยายตัวแทนการออกหุ้นใหม่ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/O/earnings-summary.md')\">sources/O/earnings-summary.md</span></li>\n</ul>"
      },
      {
        "id": "4",
        "title": "Market Context & Sentiment (As of June 15, 2026)",
        "html": "<ul class=\"brief-list\">\n<li><strong>Latest News:</strong> ราคาหุ้นมักผันผวนผกผันกับ Bond Yield สหรัฐฯ โดยล่าสุดเผชิญแรงกดดันจากภาวะดอกเบี้ยสูง แต่ได้แรงหนุนจากการขยายพอร์ตในยุโรปที่ให้ Yield สูง (7%+)</li>\n<li><strong>Analyst Sentiment:</strong> ส่วนใหญ่มองเป็น \"Safe Haven\" ในกลุ่ม REIT โดยมีราคาเป้าหมายเฉลี่ยที่ประมาณ $64.50 - $68.00 <span class=\"source-tag\">Yi Market Intel</span></li>\n</ul>"
      },
      {
        "id": "5",
        "title": "Bull case / Bear case",
        "html": "<ul class=\"brief-list\">\n<li><strong>Bull case:</strong> การขยายตัวสู่ Data Centers และการใช้ Private Capital JV จะช่วยรักษาการเติบโตของ AFFO โดยไม่ทำให้ผู้ถือหุ้นเดิมถูก Dilute มากเกินไป</li>\n<li><strong>Bear case:</strong> ภาวะดอกเบี้ย \"Higher-for-longer\" จะเป็นปัจจัยกดดันราคาหุ้นและต้นทุนการรีไฟแนนซ์หนี้ในอนาคต</li>\n</ul>"
      },
      {
        "id": "6",
        "title": "Kill conditions",
        "html": "<ul class=\"brief-list\">\n<li>Occupancy Rate ลดลงต่ำกว่า 97% อย่างต่อเนื่อง</li>\n<li>อัตราการเติบโตของ AFFO ต่อหุ้น (AFFO per share) ติดลบติดต่อกันเกิน 2 ไตรมาส</li>\n<li>การลดเงินปันผล (Dividend Cut) ซึ่งจะทำลายจุดขายหลักของบริษัท</li>\n</ul>"
      },
      {
        "id": "7",
        "title": "What to ask before owning it",
        "html": "<ul class=\"brief-list\">\n<li>คุณเชื่อมั่นในความยั่งยืนของธุรกิจค้าปลีกแบบ Brick-and-mortar ในยุค E-commerce หรือไม่?</li>\n<li>พอร์ตโฟลิโอของผู้เช่ามีความแข็งแกร่งพอที่จะผ่านวิกฤตเศรษฐกิจถดถอยได้หรือไม่?</li>\n<li>คุณพร้อมจะถือหุ้นผ่านช่วงเวลาที่ดอกเบี้ยขาขึ้น ซึ่งมักจะทำให้ราคาหุ้น REIT ลดลงหรือไม่?</li>\n</ul>"
      }

    "sections": [
      {
        "id": "1",
        "title": "Company snapshot",
        "html": "<ul class=\"brief-list\">\n<li>Ondas Holdings เป็นบริษัท autonomous systems / industrial wireless ที่ exposure หลักตอนนี้อยู่กับ autonomous drones, counter-UAS, defense/homeland security และ private wireless สำหรับโครงสร้างพื้นฐานสำคัญ <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n<li>ธุรกิจมีสองแกนสำคัญ: OAS/Airobotics ฝั่ง drone systems และ Ondas Networks ฝั่ง industrial wireless/rail network upgrades เช่น Siemens/Metra 900 MHz rail upgrade <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n<li>Thesis ของ ONDS เปลี่ยนจาก survival/liquidity story ในปี 2024 เป็น growth execution story ในปี 2026 หลังรายได้และ backlog โตแรงจาก autonomous systems และ counter-UAS demand <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/financials.md')\">sources/ONDS/financials.md</span></li>\n<li>จุดขายเชิงกลยุทธ์คือ defense/counter-drone demand, partnership กับ Palantir เพื่อ integrate Foundry เข้ากับ drone platforms, และ exposure ต่อ industrial/critical infrastructure automation <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n</ul>"
      },
      {
        "id": "2",
        "title": "Fundamentals signal",
        "html": "<ul class=\"brief-list\">\n<li>ฐานะการเงินดีขึ้นมากจากปลายปี 2024 ที่มี cash เพียง $2.9M และ runway วิกฤต มาเป็น cash position $432.8M ณ 30 กันยายน 2025 หลัง capital raises <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/financials.md')\">sources/ONDS/financials.md</span></li>\n<li>รายได้ Q3 2025 โตเป็น $10.1M จาก $1.5M ใน Q3 2024 หรือเพิ่ม 582% YoY ก่อนที่ Q1 2026 จะเร่งขึ้นอีกมาก <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/financials.md')\">sources/ONDS/financials.md</span></li>\n<li>Barron's รายงาน Q1 2026 revenue $50.1M เพิ่มขึ้น 1,065% YoY และสูงกว่า analyst estimate ประมาณ $39.4M สะท้อน demand และ acquisition-driven scale ที่โตเร็วมาก <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>Backlog รายงานที่ $457M หลัง Q1 2026 เพิ่ม 569% จากสิ้นปี 2025 และบริษัทปรับ guidance ปี 2026 เป็น $390M จากเดิม $375M <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>จุดอ่อนคือยังขาดทุน: adjusted EBITDA loss Q1 2026 อยู่ที่ $10.9M และ operating expenses เพิ่มขึ้น 470% เป็น $67.3M ส่วนหนึ่งจาก acquisitions จึงต้องแยกให้ออกว่า growth ใด organic และ growth ใดซื้อมาด้วย M&A <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n</ul>"
      },
      {
        "id": "3",
        "title": "Latest earnings",
        "html": "<ul class=\"brief-list\">\n<li>Q1 2026 เป็น quarter ที่ดีมากด้าน top-line: revenue $50.1M, +1,065% YoY, beat consensus และทำให้หุ้นตอบสนองแรงหลังประกาศผล <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>Backlog $457M เป็นเหตุผลหลักที่บริษัทปรับ revenue outlook ปี 2026 ขึ้นเป็น $390M ซึ่งสูงกว่าตัวเลขเดิม $375M <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>Counter-UAS และ autonomous systems เป็นตัวขับเคลื่อนหลักของ growth ตามรายงาน Barron's โดยเฉพาะเมื่อความต้องการ defense/security เพิ่มขึ้น <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>Management signal ที่ต้องจับตาคือ Q2 2026 adjusted EBITDA loss อาจยังสูงและอาจเป็นจุด peak ก่อนจะดีขึ้นจาก revenue/gross profit/scale ในช่วงที่เหลือของปี <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>Market sentiment ดีขึ้นมาก: analyst rating ใน local market intelligence ยังระบุ Strong Buy และ price targets แถว $18-20 แต่หุ้นมี volatility สูงจากอดีต dilution และการ re-rating ของ defense/drone narrative <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n</ul>"
      },
      {
        "id": "4",
        "title": "Bull case / Bear case",
        "html": "<ul class=\"brief-list\">\n<li><strong>Bull case:</strong> ONDS มี inflection ชัดจาก liquidity crisis สู่ revenue/backlog acceleration โดย Q1 2026 revenue โต 1,065% YoY และ backlog ขึ้นเป็น $457M <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li><strong>Bull case:</strong> Palantir partnership อาจเพิ่ม credibility และ software/data layer ให้ autonomous drone platforms ทำให้ ONDS ไม่ใช่แค่ hardware vendor แต่มี AI/mission system angle <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n<li><strong>Bull case:</strong> Counter-UAS, defense, airport security และ critical infrastructure เป็นตลาดที่ demand ถูกหนุนด้วยภัยคุกคามจริง ไม่ใช่แค่ consumer drone cycle <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n<li><strong>Bear case:</strong> บริษัทโตเร็วแต่ยังไม่พิสูจน์ profitability; adjusted EBITDA ยังติดลบและ operating expenses โตแรงจาก acquisitions <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li><strong>Bear case:</strong> Guidance $390M และ backlog $457M ต้องแปลงเป็น revenue/gross profit จริง ถ้า contract delivery เลื่อนหรือ margin ต่ำ หุ้นอาจถูก re-rate จาก growth story เป็น acquisition roll-up ที่ยังขาดทุน <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li><strong>Bear case:</strong> Legacy dilution ยังเป็นแผลสำคัญของผู้ถือหุ้นเดิม และหากบริษัทต้องใช้ทุนเพิ่มเพื่อซื้อกิจการ/เร่ง production ความเสี่ยง dilution อาจกลับมา <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n</ul>"
      },
      {
        "id": "5",
        "title": "Kill conditions",
        "html": "<ul class=\"brief-list\">\n<li>Revenue guidance $390M ปี 2026 ถูกลดลง หรือ backlog $457M ไม่แปลงเป็น revenue ตาม timeline ที่ตลาดคาด <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>Adjusted EBITDA loss ไม่ดีขึ้นหลัง Q2 2026 แม้ revenue เพิ่ม แปลว่า scale ไม่ได้สร้าง operating leverage <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>Counter-UAS orders จาก defense/homeland security ลดลงหรือถูกเลื่อน เพราะ growth thesis ตอนนี้พึ่ง autonomous systems สูงมาก <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n<li>Palantir partnership ไม่เกิด product/contract traction ที่วัดผลได้ หรือเป็นแค่ narrative มากกว่า revenue driver <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n<li>บริษัทกลับไปเพิ่มทุนหนักหรือทำ M&A ที่ทำให้ dilution และ integration risk สูงกว่าประโยชน์ของ growth <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/financials.md')\">sources/ONDS/financials.md</span></li>\n</ul>"
      },
      {
        "id": "6",
        "title": "What to ask before owning it",
        "html": "<ul class=\"brief-list\">\n<li>Revenue $390M ปี 2026 มาจาก backlog ที่ binding แค่ไหน และมี gross margin profile อย่างไร? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>Backlog $457M แบ่งตาม defense/counter-UAS, autonomous drone, rail/industrial wireless และ geography อย่างไร? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>Palantir Foundry integration สร้าง revenue ที่แยกวัดได้หรือเป็นแค่ strategic partnership เพื่อเพิ่ม credibility? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/market_info.md')\">sources/ONDS/market_info.md</span></li>\n<li>บริษัทจะลด adjusted EBITDA loss หลัง Q2 2026 ได้ด้วย gross profit จริง หรือแค่ลด expense หลัง acquisition integration? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/earnings-summary-q1-2026.md')\">sources/ONDS/earnings-summary-q1-2026.md</span></li>\n<li>หลัง cash position ดีขึ้นจาก capital raises บริษัทมี capital allocation discipline พอหรือจะใช้เงินไปกับ M&A เพิ่มจน dilution/integration risk กลับมา? <span class=\"source-tag clickable\" onclick=\"viewSource('sources/ONDS/financials.md')\">sources/ONDS/financials.md</span></li>\n</ul>"

  "sources/TSM/financials.md": "---\ncompany: TSMC (Taiwan Semiconductor Manufacturing Company)\ndocument_type: financial_summary\nlast_updated: 2026-06-17\n---\n\n# TSMC Financial Summary (Q1 2026)\n\n## 1. Key Income Statement Figures (Q1 2026)\n- **Revenue:** NT$1,134.10 Billion (US$35.90B) - Up 35.1% YoY.\n- **Net Income:** NT$572.48 Billion - Up 58.3% YoY.\n- **Gross Margin:** 66.2%\n- **Operating Margin:** 58.1%\n- **Net Profit Margin:** 50.5%\n\n## 2. Key Balance Sheet Figures\n- **Cash & Marketable Securities:** NT$3,383.60 Billion (~US$106 Billion).\n- **Total Assets:** NT$8,660.95 Billion.\n- **Cash Position:** 39.0% of total assets.\n- **Debt-to-Equity Ratio:** Historically low (~0.17x), indicating high solvency.\n\n## 3. Capital Expenditure (CapEx) & Cash Flow\n- **CapEx (Q1 2026):** NT$351 Billion (US$11.1B).\n- **Full Year 2026 CapEx Budget:** US$52 Billion - US$56 Billion.\n- **Free Cash Flow:** NT$348.21 Billion.\n\n## 4. Revenue by Technology (Nodes)\n- **3nm:** 25% of wafer revenue.\n- **5nm:** 36% of wafer revenue.\n- **7nm and below (Total):** 74% of wafer revenue.\n\n*Source: Compiled from Q1 2026 Earnings Release and public financial filings.*\n",
  "sources/TSM/market_info.md": "# Market Intelligence Report: TSMC (TSM)\n**Report Date:** June 17, 2026\n\n## 1. Manufacturing & Technology\n- **A16 (1.6nm):** Production-ready by H2 2026. NVIDIA's \"Feynman\" GPU confirmed as a lead customer.\n- **2nm (N2):** Mass production scaling for late 2026. Apple has secured ~50% of early capacity for A20/M6 chips.\n- **US Operations:** 10-year partnership with Amkor Technology for packaging/testing in Arizona.\n\n## 2. Geopolitical & Regulatory Risks\n- **Taiwan Strait:** Ongoing tension with high frequency of air incursions by China; G7 maintains opposition to status quo changes.\n- **Export Controls:** Potential new Taiwan laws criminalizing AI chip leaks to China.\n- **US CHIPS Act:** Year-end 2026 tax deadline (Section 48D) accelerating Arizona fab build-out.\n\n## 3. Market Sentiment\n- **Analyst Rating:** Strong Buy (Aletheia Capital, etc.).\n- **Price Target:** Targets raised up to $700 (ADR) based on AI monopoly and pricing power.\n- **Key Risks:** Customer diversification efforts by Samsung Foundry (Google, Tesla) and rising 2nm wafer costs (+50% vs 3nm).\n\n*Source: Market intelligence gathering (Jun 2026).*\n",
  "sources/EOSE/market-info.md": "# Eos Energy Market Info\n\n- Ticker: EOSE\n- Source type: primary/curated; market-info\n- Original sources: Eos Q1 2026 earnings release and June 2026 company press releases\n- Retrieved: 2026-06-21\n- Coverage period: 2026 current company context\n- Reliability: curated from primary company releases; needs external/customer verification\n\n## Key facts\n\n- Eos designs, manufactures, and sells zinc-based long-duration battery energy storage systems.\n- The company's BESS uses Znyth technology and is positioned as a non-flammable, non-lithium alternative for utility-scale, microgrid, commercial, and industrial long-duration applications.\n- Eos describes its systems as suitable for 4 to 16+ hour storage use cases.\n- The core investment thesis is manufacturing scale-up plus conversion of backlog and pipeline into shipped systems and revenue.\n- Q1 2026 results show revenue growth and margin improvement, but gross profit and adjusted EBITDA remain negative.\n- The company is expanding manufacturing with Battery Line 2 at Thorn Hill and targets 4 GWh of annual manufacturing capacity by the end of 2026.\n- Frontier Power USA, the CAPAC Energy DACH agreement, and Redbird are important commercial traction points to monitor.\n- Major risks include manufacturing execution, project financing, backlog conversion, customer/project delays, gross margin staying negative, cash burn, dilution, and policy/tax-credit changes.\n\n## Useful for future briefs\n\n- Use this file for company snapshot, market positioning, bull/bear framing, and kill conditions.\n- Eos is not yet a clean profitability story; it is a scale-up and execution story.\n- The best evidence of thesis progress will be gross margin improvement, shipment growth, backlog conversion, and cash burn control.\n\n## Caveats\n\n- This is a curated summary from company releases, not an independent market study.\n- Add SEC filings, transcript, customer confirmations, and independent industry coverage for a fuller view.\n\n",
  "sources/EOSE/earnings-summary-q1-2026.md": "# Eos Energy Q1 2026 Earnings Summary\n\n- Ticker: EOSE\n- Source type: primary; earnings release\n- Original source: https://investors.eose.com/news-releases/news-release-details/eos-energy-enterprises-reports-first-quarter-2026-financial\n- Retrieved: 2026-06-21\n- Coverage period: Q1 2026\n- Reliability: primary company release\n\n## Key facts\n\n- Eos reported Q1 2026 revenue of $57.0 million, a 445% year-over-year increase.\n- The company said the last two quarters surpassed full-year 2025 revenue.\n- Gross loss was $44.4 million, with gross margin improving by 157 percentage points year over year and 16 points sequentially.\n- Adjusted gross loss was $39.0 million, excluding stock-based compensation and depreciation.\n- Adjusted EBITDA loss was $68.0 million, with a 294 percentage-point margin improvement from the prior-year period and a 4-point sequential margin improvement.\n- Total cash, including restricted cash, was $472.4 million as of March 31, 2026.\n- Commercial opportunity pipeline increased to $24.3 billion, up 56% year over year.\n- Orders backlog was $644.6 million, representing 2.6 GWh as of March 31, 2026.\n- Eos reaffirmed full-year 2026 revenue guidance of $300 million to $400 million.\n- Eos announced the formation of Frontier Power USA with Cerberus to develop, finance, own, and operate long-duration battery energy storage projects using Eos Z3 technology.\n- Frontier Power USA includes a planned $100 million equity commitment from Cerberus, subject to closing conditions, and a targeted contribution from Eos of about $150 million, subject to funding ability and approvals.\n- Eos said Q1 production performance set records for shipments, battery output, and bipolar manufacturing.\n\n## Useful for future briefs\n\n- Use this file for latest earnings, revenue growth, margin trajectory, cash position, backlog, pipeline, and 2026 guidance.\n- The key positive signal is that revenue and manufacturing output are scaling.\n- The key negative signal is that gross profit and adjusted EBITDA remain negative.\n- Watch whether Eos can convert pipeline and backlog into shipments without excessive cash burn or dilution.\n\n## Caveats\n\n- This is a company release and includes forward-looking statements.\n- The reported net income was heavily affected by non-cash fair value changes, so operating loss and cash flow matter more than GAAP net income for thesis quality.\n- Add the Q1 2026 10-Q and conference-call transcript if available for more detailed risk and cash-flow analysis.\n\n",
  "sources/EOSE/news-2026-06-16-second-manufacturing-facility.md": "# Eos Second Manufacturing Facility Production Launch\n\n- Ticker: EOSE\n- Source type: primary; press release\n- Original source: https://investors.eose.com/news-releases/news-release-details/eos-energy-enterprises-launches-commercial-production-second\n- Retrieved: 2026-06-21\n- Coverage period: June 16, 2026\n- Reliability: primary company release\n\n## Key facts\n\n- Eos announced commercial production at its Thorn Hill manufacturing facility in Marshall Township, Pennsylvania after completing Site Acceptance Testing for Battery Line 2.\n- The company said Battery Line 2 supports repeatable manufacturing, expands production capacity, and advances its path toward 4 GWh of annualized capacity.\n- Eos said Line 1 surpassed its full-year 2025 production in the first 164 days of 2026.\n- The company expects Battery Line 2 to ramp through 2026, with subassemblies coming online in early Q3 and full production targeted in Q4 2026.\n- Eos said the new line uses lessons from Line 1, including single-piece flow architecture, enhanced process redundancy, and advanced pick-and-place gantry systems.\n- The Thorn Hill layout reduces raw material travel by 86% and shortens overall production line length by 40% compared with Battery Line 1.\n- The company connected Line 2 demand to Frontier Power USA's 2 GWh capacity reservation agreement and other project pipelines.\n\n## Useful for future briefs\n\n- Use this file for manufacturing execution, capacity expansion, Project Spruce / scale-up logic, and margin improvement narrative.\n- The key investor question is whether Line 2 ramps on time and improves unit economics.\n- If the line misses Q3/Q4 ramp targets, that would weaken the manufacturing execution thesis.\n\n## Caveats\n\n- This is a company press release and may emphasize positive execution milestones.\n- Add later production-volume disclosures or quarterly filings to verify whether the ramp actually happened as planned.\n\n",
  "sources/EOSE/news-2026-06-17-18-commercial-orders.md": "# Eos June 2026 Commercial Order Updates\n\n- Ticker: EOSE\n- Source type: primary; press releases\n- Original sources:\n  - https://investors.eose.com/news-releases/news-release-details/eos-energy-enterprises-establishes-strategic-entry-germany\n  - https://investors.eose.com/news-releases/news-release-details/eos-energy-enterprises-announces-first-purchase-order-under\n- Retrieved: 2026-06-21\n- Coverage period: June 17-18, 2026\n- Reliability: primary company releases\n\n## Key facts\n\n- On June 17, 2026, Eos announced a binding Master Supply Agreement with CAPAC Energy for the Germany, Austria, and Switzerland region.\n- The CAPAC agreement establishes a 750 MWh capacity commitment with a pathway to scale up to 2 GWh of Indensity deployments through 2031.\n- CAPAC Energy becomes Eos' exclusive distribution partner in the DACH region under the announced framework.\n- Eos said first projects under a previously executed purchase order are in construction, with commercial operations targeted for late 2026.\n- Under the Master Supply Agreement, purchase orders will be included in Eos' reported backlog as they are issued.\n- On June 18, 2026, Eos announced the first purchase order under Frontier Power USA's 2 GWh capacity reservation agreement.\n- The order supports the Redbird project, a 100 MW / 400 MWh battery energy storage system using Eos Z3 technology in the ERCOT market.\n- Eos said Redbird volume will be applied against the 2 GWh Frontier Power USA capacity reservation agreement.\n- Eos said the Redbird order also means the company has fulfilled nearly 50% of the 1 GWh Bridgelink master supply agreement.\n- Eos said it is advancing an additional development pipeline of 12 GWh across ERCOT, PJM, CAISO, and MISO.\n\n## Useful for future briefs\n\n- Use this source for backlog quality, commercial traction, international expansion, and demand signals.\n- The key positive signal is conversion from frameworks and capacity reservations into purchase orders or construction-stage projects.\n- The key risk is that framework agreements and purchase-order timing may not translate into revenue on the schedule investors expect.\n\n## Caveats\n\n- These are company press releases and include forward-looking commercial expectations.\n- Verify future backlog conversion, revenue recognition, customer financing, and project completion through later filings.\n\n",
  "sources/ACME_CORP/financials.md": "---\ncompany: ACME CORP\ndocument_type: financial_statement\nfiscal_year: FY2025\nsource_url: internal_upload\n---\n\n# ACME CORP Financial Statement Excerpt (FY2025)\n\n## 1. Key Balance Sheet Figures\n- Cash & Cash Equivalents: $2,000,000 (down from $5,000,000 in FY2024)\n- Total Current Assets: $15,000,000\n- Total Current Liabilities: $12,000,000\n- Total Debt (Short & Long term): $25,000,000\n- Total Shareholders' Equity: $10,000,000\n\n## 2. Key Income Statement Figures\n- Annual Revenue: $48,000,000\n- Gross Profit Margin: 15% (down from 22% in FY2024)\n- Operating Income: -$1,200,000\n- Net Income: -$1,500,000 (Net Loss)\n\n## 3. Financial Analysis Context\n- Current Ratio: 1.25 (Current Assets / Current Liabilities), indicating a tight liquidity position.\n- Debt-to-Equity Ratio: 2.5 ($25,000,000 / $10,000,000), representing very high leverage and solvency risk.\n- Monthly Cash Burn Rate: Average of $500,000 per month.\n- Estimated Cash Runway: 4 months ($2,000,000 cash balance / $500,000 burn rate) unless new financing or partnership cash flow is secured.\n- Accounts Payable Aging: 62 days (payments to suppliers are increasingly delayed).\n",

  "sources/MSFT/earnings-summary.md": "# Microsoft (MSFT) Earnings Summary (Q2 FY2026)\n\n**Quarter Ended:** December 31, 2025\n**Release Date:** January 28, 2026\n\n### 1. Key Metrics\n- **Revenue:** $81.3 Billion (+17% YoY).\n- **Microsoft Cloud Revenue:** $51.5 Billion (+26% YoY). First time exceeding $50B in a single quarter.\n- **Operating Income:** $38.3 Billion (+21% YoY).\n- **Diluted EPS (Non-GAAP):** $4.14 (+24% YoY).\n\n### 2. AI & Strategic Highlights\n- **Microsoft 365 Copilot:** 15 million paid seats (+160% QoQ growth).\n- **GitHub Copilot:** 4.7 million paid subscribers (+75% YoY).\n- **OpenAI Investment:** Net gain of $7.6B from investment valuation impact.\n- **Infrastructure:** Added ~1GW of data center capacity during the quarter.\n\n### 3. Management Outlook\n- Continued focus on \"AI monetization\" and transitioning to \"Autonomous Agents.\"\n- Azure growth remains the primary driver despite intense competition.\n- CapEx expected to remain elevated to support multi-year AI demand.\n",
  "sources/MSFT/10-k-summary.md": "# Microsoft (MSFT) 10-K Summary (FY2025)\n\n**Fiscal Year Ended:** June 30, 2025\n**Source:** SEC Filing 10-K (Summary compiled via Research)\n\n### 1. Business Segments\n- **Intelligent Cloud:** Azure, SQL Server, Windows Server, Visual Studio, GitHub, and Enterprise Services. Azure grew 34% in FY25.\n- **Productivity and Business Processes:** Office 365 Commercial, Microsoft 365 Consumer, LinkedIn, and Dynamics business solutions.\n- **More Personal Computing:** Windows OEM, Devices (Surface), Gaming (Xbox content & services, Activision Blizzard), and Search/News Advertising.\n\n### 2. Financial Highlights (FY2025)\n- **Total Revenue:** $281.7 Billion (+15% YoY)\n- **Operating Income:** $128.5 Billion (+17% YoY)\n- **Net Income:** $101.8 Billion (+16% YoY)\n\n### 3. Capital Allocation\n- Approved a new $60 Billion share repurchase program in September 2024.\n- Significant increase in CapEx to support AI infrastructure and data centers.\n\n### 4. Key Risks\n- **AI Infrastructure Costs:** High CapEx requirements for AI scaling.\n- **Cybersecurity:** Potential for major security breaches or outages.\n- **Regulatory Scrutiny:** Antitrust investigations in gaming and cloud.\n- **Competition:** Intense pressure from AWS, Google Cloud, and AI-first startups.\n",
  "sources/O/earnings-summary.md": "# Realty Income (O) Earnings Summary (FY2024 Recap)\n\n**Period:** Full Year 2024\n**Release Date:** Feb 2025\n\n### 1. Key Performance Metrics\n- **Total Operational Return:** 10.2% (AFFO per share growth + dividend yield).\n- **Dividend Aristocrat:** 30 consecutive years of dividend increases.\n- **Rent Recapture:** 105.6% on 196 properties re-leased during the year.\n\n### 2. Acquisition & Investment\n- Closed **Spirit Realty Capital** merger ($9.3B).\n- Completed **$770M sale-leaseback** with 7-Eleven.\n- Leveraged Private Capital JVs to support growth while maintaining credit metrics.\n\n### 3. Outlook\n- Focus on accretive acquisitions in Europe and emerging asset classes.\n- Target maintaining leverage around the mid-5x range for Net Debt/EBITDA.\n",
