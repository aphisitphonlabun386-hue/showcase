<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Risk Showcase - ClaudyOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1917;
            --bg-secondary: #262421;
            --cream: #f4eade;
            --accent: #d4a373;
            --text-primary: #f4eade;
            --text-secondary: #d6ccc2;
            --border: #403d39;
            --bar-start: #d4a373;
            --bar-end: #a17c5b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; padding: 3rem; margin: 0; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 3.5rem; text-align: center; margin-bottom: 3rem; color: var(--cream); letter-spacing: -1px; }
        
        .infographic-canvas { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2rem; }
        
        .story-node { background: var(--bg-secondary); padding: 2.5rem; border: 1px solid var(--border); border-radius: 20px; transition: transform 0.3s ease; cursor: pointer; }
        .story-node:hover { transform: translateY(-10px); border-color: var(--accent); }
        
        .ticker { font-size: 3.5rem; font-weight: 800; color: var(--accent); margin-bottom: 1rem; font-family: 'Outfit', sans-serif; }
        
        .bar-container { height: 12px; background: #333; border-radius: 6px; margin: 20px 0; overflow: hidden; }
        .bar { height: 100%; background: linear-gradient(90deg, var(--bar-start), var(--bar-end)); width: 0%; transition: width 1.5s ease-out; }
        
        .snapshot-text { color: var(--text-secondary); line-height: 1.7; font-size: 1.1rem; }
        .data-point { display: flex; justify-content: space-between; margin-top: 1.5rem; font-size: 0.95rem; color: var(--accent); font-weight: 600; }
        
        /* Modal System (reused) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-secondary); width: 90%; max-width: 900px; max-height: 80vh; border-radius: 20px; padding: 2rem; overflow-y: auto; color: var(--cream); }
    </style>
</head>
<body>
    <h1>Market Data Stories</h1>
    <div id="canvas" class="infographic-canvas"></div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        let currentData = [];
        fetch('data/stocks.json')
            .then(res => res.json())
            .then(data => {
                currentData = data;
                const canvas = document.getElementById('canvas');
                data.forEach((stock, idx) => {
                    if (!stock.snapshot) return;
                    const node = document.createElement('div');
                    node.className = 'story-node';
                    node.onclick = () => openModal(idx);
                    node.innerHTML = `
                        <div class="ticker">${stock.ticker}</div>
                        <p class="snapshot-text">${stock.snapshot.substring(0, 120)}...</p>
                        <div class="bar-container"><div class="bar" style="width: ${Math.random() * 50 + 50}%"></div></div>
                        <div class="data-point"><span>Market Sentiment</span><span>Bullish</span></div>
                    `;
                    canvas.appendChild(node);
                });
            });

        function openModal(idx) {
            const stock = currentData[idx];
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h2 style="color:var(--accent); margin-bottom:1rem;">${stock.ticker} - Detailed Insights</h2>
                <div style="line-height:1.8;">
                    ${stock.snapshot}
                    <h3 style="margin-top:1.5rem; color:var(--accent);">Latest Earnings</h3>
                    <ul>${stock.latest_earnings.map(e => `<li>${e}</li>`).join('')}</ul>
                    <h3 style="margin-top:1.5rem; color:var(--accent);">Outlook</h3>
                    <p><strong>Bull:</strong> ${stock.bull_case}</p>
                    <p><strong>Bear:</strong> ${stock.bear_case}</p>
                </div>
                <button onclick="closeModal()" style="margin-top:2rem; padding:0.5rem 1rem; cursor:pointer;">Close</button>
            `;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
